<!DOCTYPE html>
<html>
<body>
    <!-- Простой контейнер для игры -->
    <div id="game" style="width:100vw; height:100vh;"></div>

    <!-- Загружаем всё из CDN -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        window.EJS_player = '#game';
        window.EJS_core = 'sega';
        // Используем прямую ссылку на RAW файл с GitHub (это 100% рабочий путь)
        window.EJS_gameUrl = 'https://raw.githubusercontent.com/klimsporyshevklim-collab/Retrosega/main/public/battletoads.bin';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
    </script>
</body>
</html>
