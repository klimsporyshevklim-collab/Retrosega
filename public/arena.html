<!DOCTYPE html>
<html>
<head><script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script></head>
<body style="margin:0; background:#000;">
    <div id="game-container" style="width:100vw; height:100vh;"></div>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        // Если режим мультиплеера - включаем сервер соединений
        const params = new URLSearchParams(window.location.search);
        if(params.get('mode') === 'netplay') {
            window.EJS_netplayServer = "wss://netplay.emulatorjs.org";
        }
    </script>
</body>
</html>
