<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA</title>
    <!-- Официальный загрузчик EmulatorJS из облака -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex: 1; width: 100vw; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega'; // Ядро SEGA
        window.EJS_gameUrl = '/battletoads.bin'; // Твой файл игры
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; // Облачный движок
        window.EJS_startOnLoaded = true;
        
        // ВКЛЮЧАЕМ МУЛЬТИПЛЕЕР
        // Это заставит эмулятор показать иконку "Netplay" (два монитора) внизу
        window.EJS_netplayServer = "wss://netplay.emulatorjs.org";
    </script>
</body>
</html>
