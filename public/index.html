<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena - Cloud Gaming</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</head>
<body style="margin:0; background:#000;">
    <div id="game-container" style="width:100vw; height:100vh;"></div>
    
    <script>
        // Настройка
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;

        // Стрим-магия
        const peer = new Peer();
        
        window.EJS_ready = () => {
            const canvas = document.querySelector('canvas');
            const stream = canvas.captureStream(30); // Захват игры как видео

            peer.on('call', call => {
                call.answer(stream); // Отдаем видео Игроку 2
            });

            // Игрок 2 подключается и видит игру
            peer.on('connection', conn => {
                conn.on('data', data => {
                    // Игрок 2 шлет команды, мы их выполняем
                    simulateKey(data.btn, data.state);
                });
            });
        };

        function simulateKey(btn, state) {
            const ev = new KeyboardEvent(state ? 'keydown' : 'keyup', { code: btn, bubbles: true });
            document.dispatchEvent(ev);
        }
    </script>
</body>
</html>
