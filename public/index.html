<!DOCTYPE html>
<html>
<body style="background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
    <h1 style="color:#00f0ff; font-family:sans-serif;">PIXEL ARENA</h1>
    <button id="play-btn" style="padding:20px; background:#00f0ff; border-radius:10px; border:none; font-weight:bold;">ЗАПУСТИТЬ ИГРУ</button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.getElementById('play-btn').onclick = () => {
            const gameUrl = "https://tg-game-arena.onrender.com/game.html";
            // Если мы внутри Телеграма, выкидываем игрока во внешний браузер
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(gameUrl);
            } else {
                window.location.href = gameUrl;
            }
        };
    </script>
</body>
</html>
