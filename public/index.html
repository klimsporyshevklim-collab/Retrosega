<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Kombat Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-frame { width: 100vw; height: 50vh; border: none; background: #000; }
        .controls { height: 50vh; background: #111; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; align-items: center; }
        .btn { background: #222; border: 1px solid #444; border-radius: 12px; padding: 20px; text-align: center; font-weight: bold; }
        .btn:active { background: #00f0ff; color: #000; }
    </style>
</head>
<body>

    <!-- Экран игры (Iframe) -->
    <iframe id="game-frame" src="about:blank"></iframe>

    <!-- Панель управления -->
    <div class="controls">
        <button class="btn" onpointerdown="send('UP')">▲</button>
        <button class="btn" onpointerdown="send('A')">A</button>
        <button class="btn" onpointerdown="send('START')">START</button>
    </div>

    <script>
        // Запускаем игру внутри фрейма
        function launch(rom) {
            const frame = document.getElementById('game-frame');
            // Официальный надежный путь
            frame.src = `https://cdn.emulatorjs.org/stable/index.html?system=sega&rom=/${rom}`;
        }

        // ОТПРАВКА КОМАНД В IFRAME (Pro метод)
        function send(key) {
            const frame = document.getElementById('game-frame');
            // Эмулятор в iframe слушает сообщения от родительского окна
            frame.contentWindow.postMessage({
                type: 'key',
                code: key
            }, '*');
        }

        // Твой список игр
        launch('battletoads.bin'); 
    </script>
</body>
</html>
