<!DOCTYPE html>
<html>
<body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh;">
    
    <button id="btn" style="padding:20px 40px; background:#00f0ff; border-radius:15px; font-weight:bold; border:none; cursor:pointer;">
        ЗАПУСТИТЬ ТУРНИР В БРАУЗЕРЕ
    </button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        document.getElementById('btn').onclick = () => {
            // Твой сайт на Render, который мы сейчас настроим на игру
            const gameUrl = "https://tg-game-arena.onrender.com/arena.html";
            
            if (window.Telegram && window.Telegram.WebApp) {
                // Выкидываем игрока из Телеграма в нормальный браузер
                window.Telegram.WebApp.openLink(gameUrl);
            } else {
                window.location.href = gameUrl;
            }
        };
    </script>
</body>
</html>
