    function render(system) {
        const list = document.getElementById('game-list');
        list.innerHTML = '';
        allGames.filter(g => g.system === system).forEach(game => {
            list.innerHTML += `
                <div class="game-btn p-3 rounded-lg border border-zinc-700 text-center shadow-lg flex items-center justify-center h-20" onclick="openGame('${game.url}')">
                    <p class="text-[11px] font-bold uppercase tracking-wider">${game.name}</p>
                </div>`;
        });
    }
    
    function openGame(url) {
        document.getElementById('player').style.display = 'block';
        document.getElementById('game-frame').src = url;
    }

    function closeGame() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }

    // По умолчанию открываем NINTENDO
    render('NINTENDO');
</script>
