<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL ARENA - LIBRARY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .game-card { border: 1px solid #333; transition: 0.2s; }
        .game-card:hover { border-color: #00f0ff; background: #111; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-3xl font-black text-cyan-400 text-center mb-6 uppercase">PIXEL ARENA</h1>
    
    <div class="flex gap-2 mb-6 overflow-x-auto pb-2 justify-center">
        <button onclick="renderGames('SEGA')" class="px-4 py-2 bg-blue-900 rounded-lg font-bold">SEGA</button>
        <button onclick="renderGames('NINTENDO')" class="px-4 py-2 bg-red-900 rounded-lg font-bold">NINTENDO</button>
        <button onclick="renderGames('ARCADE')" class="px-4 py-2 bg-green-900 rounded-lg font-bold">ARCADE</button>
    </div>

    <div id="game-list" class="grid grid-cols-2 gap-4 max-w-2xl mx-auto"></div>

    <div id="player" class="hidden fixed inset-0 bg-black z-50">
        <button onclick="closeGame()" class="absolute top-4 right-4 bg-red-600 px-6 py-2 rounded-full font-bold">ВЫХОД</button>
        <iframe id="game-frame" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        const allGames = [
            { name: "Battletoads", system: "SEGA", url: "https://www.retrogames.cc/embed/16901-battletoads-world.html" },
            { name: "Sonic 2", system: "SEGA", url: "https://www.retrogames.cc/embed/16896-sonic-the-hedgehog-2-world.html" },
            { name: "Mortal Kombat 3", system: "SEGA", url: "https://www.retrogames.cc/embed/19038-mortal-kombat-3-europe.html" },
            { name: "Contra", system: "NINTENDO", url: "https://www.retrogames.cc/embed/16885-contra-usa.html" },
            { name: "Battle City", system: "NINTENDO", url: "https://www.retrogames.cc/embed/16882-battle-city-japan.html" },
            { name: "Street Fighter II", system: "ARCADE", url: "https://www.retrogames.cc/embed/17395-street-fighter-ii-world-910214.html" }
        ];

        function renderGames(system) {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            allGames.filter(g => g.system === system).forEach(game => {
                list.innerHTML += `
                    <div class="game-card p-4 rounded-xl cursor-pointer bg-zinc-900" onclick="openGame('${game.url}')">
                        <p class="text-center font-bold text-xs">${game.name}</p>
                    </div>`;
            });
        }

        function openGame(url) {
            document.getElementById('player').style.display = 'block';
            document.getElementById('game-frame').src = url;
        }

        function closeGame() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        // Показать SEGA при загрузке
        renderGames('SEGA');
    </script>
</body>
</html>
