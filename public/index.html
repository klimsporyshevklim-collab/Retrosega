<!DOCTYPE html>
<html>
<head>
    <title>Battletoads RAM Monitor</title>
    <style>
        body { margin: 0; background: #000; font-family: monospace; color: white; }
        #game-container { width: 100vw; height: 80vh; }
        #ram-monitor { height: 20vh; background: #222; overflow-y: scroll; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ram-monitor">RAM MONITOR: WAITING FOR CORE...</div>

    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.md'; // Убедись, что файл так называется
        window.EJS_pathtodata = '/data/';

        // Внедряем наш "шпион"
        window.EJS_onGameStart = function() {
            const monitor = document.getElementById('ram-monitor');
            
            // Каждые 100мс проверяем память
            setInterval(() => {
                if (window.EJS_emulator.asm) {
                    try {
                        // Читаем первые 256 байт памяти
                        const ramSlice = window.EJS_emulator.asm.HEAPU8.slice(0xA00000, 0xA00100);
                        
                        let output = "RAM (0xA00000 - 0xA00100):\n";
                        for (let i = 0; i < ramSlice.length; i += 16) {
                            output += ramSlice.slice(i, i + 16).join(' ') + "\n";
                        }
                        monitor.innerText = output;
                    } catch (e) {
                        monitor.innerText = "Error reading RAM: " + e.message;
                    }
                }
            }, 100);
        };

        const s = document.createElement('script');
        s.src = '/data/loader.js';
        document.body.appendChild(s);
    </script>
</body>
</html>
