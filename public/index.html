<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        #emulator-wrapper { width: 100vw; height: 50vh; background: #000; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 65px; height: 65px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #333; color: #0f0; touch-action: none; }
        .ctrl-btn:active { background: #00f0ff; color: #000; }
        #status-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,255,0,0.1); color: #0f0; font-size: 8px; padding: 4px; z-index: 10001; text-align: center; border-bottom: 1px solid #0f0; }
    </style>
</head>
<body>

    <div id="status-bar">Инициализация системы...</div>

    <div id="game-overlay">
        <div class="h-10 bg-zinc-950 border-b border-cyan-900/50 flex justify-between items-center px-4">
            <span class="text-[10px] font-bold text-white uppercase tracking-widest">BATTLETOADS LIVE</span>
            <button onclick="location.reload()" class="text-red-500 text-[8px] font-bold uppercase">СБРОС</button>
        </div>

        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>

        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6 items-center">
                    <button class="ctrl-btn bg-red-600 border-red-400 text-white font-bold text-2xl shadow-lg" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-3 px-8 rounded-2xl text-[10px] font-bold text-white border border-zinc-700 uppercase tracking-widest" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        function log(m) { statusBar.innerText = m; }

        async function startApp() {
            log("Загрузка Battletoads...");
            try {
                // Прямая ссылка на твой файл на Render
                const romUrl = window.location.origin + '/battletoads.bin';
                
                window.EJS_player = '#game-container';
                window.EJS_core = 'sega'; // Можно попробовать 'genesis_plus_gx' если не заведется
                window.EJS_gameUrl = romUrl;
                
                // Используем стабильный CDN с принудительным HTTPS
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                s.onload = () => {
                    log("Движок загружен. Ожидание графики...");
                    // Если через 5 секунд всё еще черный экран - пробуем "пинок"
                    setTimeout(() => {
                        const canvas = document.querySelector('canvas');
                        if (canvas) {
                            log("Игра запущена! Жми START");
                        } else {
                            log("Ошибка: Ядро не ответило. Попробуй обновить страницу.");
                        }
                    }, 5000);
                };
                document.body.appendChild(s);

            } catch (e) {
                log("ОШИБКА: " + e.message);
            }
        }

        function fireKey(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { 
                code: code, key: code, keyCode: (code === 'Enter' ? 13 : 0), bubbles: true 
            });
            document.dispatchEvent(event);
            if (canvas) {
                canvas.focus();
                canvas.dispatchEvent(event);
            }
        }

        function bind(id, k) {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); fireKey(k, true); };
            el.onpointerup = (e) => { e.preventDefault(); fireKey(k, false); };
        }
        
        const keys = { "btn-up": "ArrowUp", "btn-down": "ArrowDown", "btn-left": "ArrowLeft", "btn-right": "ArrowRight", "btn-a": "KeyX", "btn-start": "Enter" };
        Object.keys(keys).forEach(id => bind(id, keys[id]));

        // Запускаем всё сразу при загрузке страницы
        window.onload = startApp;
    </script>
</body>
</html>
