<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena V8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #debug-panel { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; 
            background: rgba(0,0,0,0.9); font-size: 10px; padding: 10px;
            border-bottom: 2px solid #333; pointer-events: auto;
        }
        .err { color: #ff4444; font-weight: bold; }
        .ok { color: #44ff44; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100%; height: 45vh !important; background: #111; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 60px; height: 60px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

    <!-- ПАНЕЛЬ ОШИБОК (ВСЕГДА ВИДНО) -->
    <div id="debug-panel">
        <div>--- SYSTEM STATUS ---</div>
        <div id="status-socket">Socket: Ожидание...</div>
        <div id="status-engine">Engine: Ожидание...</div>
        <div id="status-rom">ROM: Ожидание...</div>
        <div id="runtime-errors" class="err"></div>
        <button onclick="location.reload(true)" style="background:#444; padding:2px 5px; margin-top:5px; border-radius:3px;">FORCED RELOAD</button>
    </div>

    <!-- МЕНЮ -->
    <div id="menu" class="p-4 pt-24 space-y-4">
        <h1 class="text-cyan-400 font-bold text-xl uppercase">Pixel Arena V8</h1>
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <h4 class="text-white font-bold mb-4 uppercase text-sm">Battletoads</h4>
            <div class="flex gap-4">
                <button onclick="app.start('battletoads.md')" class="bg-cyan-500 text-black font-bold p-3 rounded-lg flex-1">START HOST</button>
                <button onclick="app.showJoin()" class="bg-red-600 font-bold p-3 rounded-lg flex-1">JOIN P2</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="game-overlay">
        <div class="h-10 bg-zinc-900 flex justify-between items-center px-4 border-b border-zinc-800 pt-1">
            <span id="room-tag" class="text-cyan-400 text-xs">ROOM: ---</span>
            <button onclick="location.reload()" class="text-zinc-500 text-xs uppercase font-bold">Close</button>
        </div>
        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>
        <div class="flex-1 bg-black flex flex-col justify-center p-4">
            <div class="flex justify-between items-center w-full max-w-md mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button id="btn-up" class="ctrl-btn text-white">▲</button><div></div>
                    <button id="btn-left" class="ctrl-btn text-white">◀</button>
                    <div class="w-14 h-14 bg-zinc-900 rounded-full border-2 border-zinc-700"></div>
                    <button id="btn-right" class="ctrl-btn text-white">▶</button>
                    <div></div><button id="btn-down" class="ctrl-btn text-white">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-4">
                    <button id="btn-a" class="w-16 h-16 bg-red-600 rounded-full font-bold text-white shadow-lg">A</button>
                    <button id="btn-start" class="bg-zinc-700 px-4 py-2 rounded font-bold text-xs">START</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция вывода ошибок на экран
        function logErr(msg) {
            const div = document.getElementById('runtime-errors');
            div.innerHTML += `<div>❌ ${msg}</div>`;
            console.error(msg);
        }

        window.onerror = (m, s, l) => logErr(`${m} в строке ${l}`);

        const socket = io();
        let currentRoom = null;
        let pNum = 1;

        socket.on('connect', () => {
            document.getElementById('status-socket').innerHTML = "✅ Socket: <span class='ok'>ONLINE</span>";
        });

        socket.on('connect_error', (e) => {
            document.getElementById('status-socket').innerHTML = "❌ Socket: <span class='err'>ERROR</span>";
        });

        const app = {
            start: function(rom) {
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                pNum = 1;
                socket.emit('createRoom', currentRoom);
                document.getElementById('room-tag').innerText = `HOST: ${currentRoom}`;
                this.load(rom);
            },
            showJoin: function() {
                const code = prompt("Enter Host ID:");
                if(code) {
                    currentRoom = code.toUpperCase();
                    pNum = 2;
                    socket.emit('joinRoom', currentRoom);
                    document.getElementById('room-tag').innerText = `P2: ${currentRoom}`;
                    this.load('battletoads.md');
                }
            },
            load: function(romFile) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';
                
                document.getElementById('status-engine').innerText = "Engine: Загрузка...";
                
                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = window.location.origin + '/' + romFile;
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                // Проверка файла ROM
                fetch(window.EJS_gameUrl).then(r => {
                    if(r.ok) document.getElementById('status-rom').innerHTML = `✅ ROM: <span class='ok'>FOUND</span>`;
                    else logErr(`ROM 404: ${romFile} не найден!`);
                }).catch(e => logErr(`Сетевая ошибка ROM: ${e.message}`));

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                s.onload = () => {
                    document.getElementById('status-engine').innerHTML = "✅ Engine: <span class='ok'>LOADED</span>";
                };
                s.onerror = () => logErr("Engine CDN Error: Не удалось загрузить ядро!");
                document.body.appendChild(s);
            }
        };

        function fire(code, isDown) {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                canvas.focus();
                canvas.dispatchEvent(new KeyboardEvent(isDown ? 'keydown' : 'keyup', { code: code, bubbles: true }));
            }
        }

        socket.on('inputSync', (data) => {
            if(data.player !== pNum) {
                const maps = [
                    { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" },
                    { UP: "KeyW", DOWN: "KeyS", LEFT: "KeyA", RIGHT: "KeyD", A: "KeyJ", START: "Space" }
                ];
                fire(maps[data.player-1][data.btn], data.state);
            }
        });

        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (d) => {
                const maps = [
                    { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" },
                    { UP: "KeyW", DOWN: "KeyS", LEFT: "KeyA", RIGHT: "KeyD", A: "KeyJ", START: "Space" }
                ];
                fire(maps[pNum-1][k], d);
                if(currentRoom) socket.emit('inputSync', { roomId: currentRoom, player: pNum, btn: k, state: d });
            };
            el.onpointerdown = (e) => { e.preventDefault(); handle(true); };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
        }
        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
