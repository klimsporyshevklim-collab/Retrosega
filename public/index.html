<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena v12.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100vw; height: 50vh !important; background: #111; position: relative; border-bottom: 2px solid #333; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 65px; height: 65px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #444; touch-action: none; }
        .ctrl-btn:active { background: #444; transform: scale(0.9); }
        #status-bar { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,255,0,0.1); color: #0f0; font-size: 8px; padding: 2px; z-index: 10001; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="status-bar">Система: Ожидание...</div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <main id="menu" class="flex-1 p-6 flex flex-col items-center justify-center space-y-8">
        <div class="text-center">
            <h1 class="text-cyan-400 text-4xl font-black italic tracking-tighter uppercase">PIXEL ARENA</h1>
            <p class="text-zinc-500 text-[10px] tracking-widest mt-1">Sega Genesis Netplay</p>
        </div>
        
        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 space-y-6 w-full max-w-sm text-center shadow-2xl relative overflow-hidden">
            <div class="absolute -top-4 -left-4 w-20 h-20 bg-cyan-500/10 rounded-full blur-3xl"></div>
            <div class="text-6xl mb-4">🐸</div>
            <h4 class="text-white font-bold uppercase text-xl">Battletoads</h4>
            
            <div class="flex flex-col gap-3">
                <button onclick="app.start('battletoads.bin', true)" class="bg-white text-black font-black py-4 rounded-2xl uppercase text-xs shadow-lg active:scale-95 transition-transform">
                    Одиночная игра (Solo)
                </button>
                
                <div class="flex gap-2">
                    <button onclick="app.start('battletoads.bin', false, 1)" class="bg-cyan-500 text-black font-black py-3 rounded-2xl flex-1 text-[10px] uppercase active:scale-95 transition-transform">
                        Создать Лобби
                    </button>
                    <button onclick="app.showJoin()" class="bg-zinc-800 font-bold py-3 rounded-2xl flex-1 text-[10px] uppercase text-white border border-zinc-700 active:scale-95 transition-transform">
                        Войти P2
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- МОДАЛКА ВХОДА -->
    <div id="join-modal" class="hidden fixed inset-0 bg-black/98 z-[5000] flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-8 rounded-3xl border border-cyan-500/30 w-full max-w-xs text-center shadow-2xl">
            <h3 class="text-white font-bold mb-2 uppercase text-sm">Вход в комнату</h3>
            <p class="text-zinc-500 text-[10px] mb-6 uppercase">Введите 4-значный код хоста</p>
            <input id="lobby-input" type="text" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-white text-center font-bold text-2xl tracking-[0.2em] uppercase mb-6 outline-none focus:border-cyan-500 transition-colors" maxlength="4" placeholder="0000">
            <button id="btn-submit-join" class="w-full bg-cyan-500 text-black font-black py-4 rounded-2xl uppercase shadow-lg">Подключиться</button>
            <button onclick="document.getElementById('join-modal').classList.add('hidden')" class="mt-4 text-zinc-600 text-xs uppercase font-bold">Отмена</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ОВЕРЛЕЙ -->
    <div id="game-overlay">
        <div class="h-10 bg-zinc-950 border-b border-white/5 flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="game-tag" class="text-[10px] font-bold text-white uppercase tracking-tighter">Live Session</span>
            </div>
            <button onclick="location.reload()" class="bg-zinc-800 text-white text-[8px] px-3 py-1 rounded-full font-bold uppercase border border-zinc-700">Выход</button>
        </div>

        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>

        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6 items-center">
                    <button class="ctrl-btn bg-red-600 border-red-400 text-white font-bold shadow-lg shadow-red-600/20" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-3 px-6 rounded-2xl text-[10px] font-bold text-white border border-zinc-700 uppercase tracking-widest" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const status = document.getElementById('status-bar');
        const log = (m) => { status.innerText = "Статус: " + m; console.log(m); };

        let currentRoom = null;
        let pNum = 1;
        let isSoloMode = true;

        const keyCodes = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };

        window.app = {
            start: function(rom, solo, p = 1) {
                isSoloMode = solo;
                pNum = p;
                if (!isSoloMode) {
                    currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                    socket.emit('createRoom', currentRoom);
                    document.getElementById('game-tag').innerText = `ROOM: ${currentRoom}`;
                    log(`Создана комната ${currentRoom}`);
                } else {
                    document.getElementById('game-tag').innerText = `SOLO PLAY`;
                    log(`Запуск одиночной игры...`);
                }
                this.load(rom);
            },
            showJoin: function() {
                document.getElementById('join-modal').classList.remove('hidden');
                document.getElementById('btn-submit-join').onclick = () => {
                    const code = document.getElementById('lobby-input').value.toUpperCase();
                    if(!code) return;
                    currentRoom = code; pNum = 2; isSoloMode = false;
                    socket.emit('joinRoom', currentRoom);
                    document.getElementById('join-modal').classList.add('hidden');
                    document.getElementById('game-tag').innerText = `ROOM: ${currentRoom} (P2)`;
                    this.load('battletoads.bin');
                };
            },
            load: function(romFile) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                // Прямой путь к твоему файлу (обязательно бинарный!)
                window.EJS_gameUrl = window.location.origin + '/' + romFile + '?v=' + Date.now();
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                s.onload = () => log("Эмулятор запущен! Нажми START");
                document.body.appendChild(s);
            }
        };

        function fireKey(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { 
                code: code, 
                key: code,
                keyCode: (code === 'Enter' ? 13 : 0),
                bubbles: true 
            });
            document.dispatchEvent(event);
            if (canvas) { canvas.focus(); canvas.dispatchEvent(event); }
        }

        socket.on('inputSync', (data) => {
            if(!isSoloMode && data.player !== pNum) {
                fireKey(keyCodes[data.btn], data.state);
            }
        });

        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (d) => {
                fireKey(keyCodes[k], d);
                if(!isSoloMode && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: pNum, btn: k, state: d });
                }
            };
            el.onpointerdown = (e) => { 
                e.preventDefault(); handle(true); 
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
        }
        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
