<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena v4</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase 8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { background: #09090b; color: white; font-family: monospace; margin: 0; overflow: hidden; touch-action: none; }
        
        .tab-btn { flex: 1; padding: 15px; font-weight: bold; color: #555; background: #111; border: none; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .tab-btn.active { color: #00f0ff; background: #1a1a1d; border-bottom: 2px solid #00f0ff; }
        
        .game-card { background: #18181b; padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-play { background: #00f0ff; color: black; padding: 8px 15px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
        .btn-host { background: #ff003c; color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; }
        
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #game-container { width: 100%; height: 100%; flex: 1; }

        /* Джойстик */
        #controller-overlay { display: none; height: 100vh; background: #000; flex-direction: column; align-items: center; justify-content: center; gap: 50px; }
        .dpad-btn { width: 65px; height: 65px; background: #222; border-radius: 12px; color: white; font-size: 24px; border: 1px solid #444; }
        .dpad-btn:active { background: #00f0ff; color: black; }
        .action-btn { width: 75px; height: 75px; border-radius: 50%; font-weight: bold; font-size: 24px; color: white; border: none; }
        .action-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ШАПКА -->
    <header class="p-4 bg-zinc-950 flex justify-between items-center border-b border-white/10">
        <h1 class="text-white font-bold text-xl italic text-[#00f0ff]">ARENA<span class="text-white">X</span></h1>
        <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1 rounded-full border border-white/10">
            <span class="text-xs font-bold text-white">Игрок 1</span>
        </div>
    </header>

    <!-- ВКЛАДКИ -->
    <div class="flex">
        <button id="tab-arcade" class="tab-btn active" onclick="switchTab('arcade')">ИГРЫ</button>
        <button id="tab-lobbies" class="tab-btn" onclick="switchTab('lobbies')">ЛОББИ <span id="lobby-count" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] ml-1">0</span></button>
    </div>

    <!-- СПИСОК ИГР -->
    <main id="screen-arcade" class="flex-1 overflow-y-auto p-4">
        
        <!-- BATTLETOADS -->
        <div class="game-card border-l-4 border-l-green-500">
            <div>
                <h3 class="font-bold text-sm">BATTLETOADS</h3>
                <p class="text-[10px] text-gray-500">Кооператив • 2 Игрока</p>
            </div>
            <div class="flex gap-2">
                <button onclick="startGame('battletoads.md')" class="btn-play">SOLO</button>
                <button onclick="hostGame('battletoads.md', 'Battletoads')" class="btn-host">HOST P1</button>
            </div>
        </div>

        <!-- UMK3 -->
        <div class="game-card border-l-4 border-l-red-500">
            <div>
                <h3 class="font-bold text-sm">ULTIMATE MK 3</h3>
                <p class="text-[10px] text-gray-500">Файтинг • 2 Игрока</p>
            </div>
            <div class="flex gap-2">
                <button onclick="startGame('umk3.md')" class="btn-play">SOLO</button>
                <button onclick="hostGame('umk3.md', 'Mortal Kombat')" class="btn-host">HOST P1</button>
            </div>
        </div>

        <!-- SONIC -->
        <div class="game-card border-l-4 border-l-blue-500">
            <div>
                <h3 class="font-bold text-sm">SONIC THE HEDGEHOG</h3>
                <p class="text-[10px] text-gray-500">Соло прохождение</p>
            </div>
            <div class="flex gap-2">
                <button onclick="startGame('sonic.bin')" class="btn-play w-full">ИГРАТЬ SOLO</button>
            </div>
        </div>
    </main>

    <!-- СПИСОК ЛОББИ -->
    <main id="screen-lobbies" class="hidden flex-1 overflow-y-auto p-4">
        <div id="lobbies-list" class="space-y-2">
            <p class="text-center text-gray-500 text-xs mt-10">Поиск активных комнат...</p>
        </div>
    </main>

    <!-- ЭКРАН ЭМУЛЯТОРА (HOST) -->
    <div id="game-overlay">
        <div class="h-12 bg-zinc-900 flex justify-between items-center px-4 border-b border-[#00f0ff]/30">
            <span id="game-tag" class="text-xs font-bold text-[#00f0ff]">SOLO MODE</span>
            <button onclick="location.reload()" class="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold">ЗАКРЫТЬ</button>
        </div>
        <div id="game-container"></div>
    </div>

    <!-- ВИРТУАЛЬНЫЙ ДЖОЙСТИК (P2) -->
    <div id="controller-overlay">
        <div class="text-center">
            <span class="bg-pink-600 text-white text-xs font-bold px-4 py-1 rounded-full animate-pulse">P2 АКТИВЕН</span>
            <p id="controller-game-name" class="text-gray-500 text-xs mt-2">Игра...</p>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(3, 65px); gap: 10px;">
            <div></div><button id="p-up" class="dpad-btn">▲</button><div></div>
            <button id="p-left" class="dpad-btn">◀</button>
            <div style="background: #111; border-radius: 50%; border: 4px solid #000;"></div>
            <button id="p-right" class="dpad-btn">▶</button>
            <div></div><button id="p-down" class="dpad-btn">▼</button><div></div>
        </div>
        
        <div style="display: flex; gap: 20px;">
            <button id="p-a" class="action-btn" style="background: #ff003c;">A</button>
            <button id="p-b" class="action-btn" style="background: #ffaa00;">B</button>
            <button id="p-c" class="action-btn" style="background: #0055ff;">C</button>
        </div>
        
        <button id="p-start" class="action-btn" style="width: 150px; height: 50px; border-radius: 25px; background: #444;">START</button>
    </div>

    <script>
        // ❌❌❌ ВСТАВЬ СВОИ КЛЮЧИ FIREBASE СЮДА ❌❌❌
        const firebaseConfig = {
            projectId: "ТВОЙ_ПРОЕКТ",
            appId: "ТВОЙ_APP_ID",
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "ТВОЙ_ПРОЕКТ.firebaseapp.com"
        };

        let db, currentLobby = null, isHost = false;
        
        // Карта кнопок P2 (Настроено так, чтобы не мешать P1 на клавиатуре)
        // I, K, J, L - Крестовина. F, G, H - Кнопки ABC. V - Старт.
        const p2map = { UP: "KeyI", DOWN: "KeyK", LEFT: "KeyJ", RIGHT: "KeyL", A: "KeyF", B: "KeyG", C: "KeyH", START: "KeyV" };

        document.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                listenForLobbies(); // Запускаем поиск комнат
            } catch(e) { console.error("Firebase error"); }

            window.switchTab = function(tab) {
                document.getElementById('screen-arcade').style.display = tab === 'arcade' ? 'block' : 'none';
                document.getElementById('screen-lobbies').style.display = tab === 'lobbies' ? 'block' : 'none';
                document.getElementById('tab-arcade').className = tab === 'arcade' ? 'tab-btn active' : 'tab-btn';
                document.getElementById('tab-lobbies').className = tab === 'lobbies' ? 'tab-btn active' : 'tab-btn';
            };

            function launchEmulator(romName) {
                document.getElementById('screen-arcade').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = '/' + romName;
                window.EJS_pathtodata = '/data/';

                const script = document.createElement('script');
                script.src = '/data/loader.js';
                document.body.appendChild(script);
            }

            window.startGame = function(romName) {
                launchEmulator(romName);
            };

            window.hostGame = function(romName, gameTitle) {
                if(!db) return alert("Firebase не подключен!");
                isHost = true;
                currentLobby = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                document.getElementById('game-tag').innerText = "ХОСТ: " + currentLobby;
                
                // Создаем лобби в Firebase
                db.collection("lobbies").doc(currentLobby).set({ 
                    title: gameTitle, 
                    rom: romName, 
                    status: "open", 
                    createdAt: Date.now(),
                    controller2: null 
                });

                // Слушаем нажатия джойстика
                db.collection("lobbies").doc(currentLobby).onSnapshot(doc => {
                    const d = doc.data();
                    if(d && d.controller2) {
                        const code = p2map[d.controller2.btn];
                        if(code) {
                            window.dispatchEvent(new KeyboardEvent(d.controller2.state ? 'keydown' : 'keyup', { code: code }));
                        }
                    }
                });

                launchEmulator(romName);
            };

            window.joinGame = function(lobbyId, gameTitle) {
                currentLobby = lobbyId;
                isHost = false;
                
                document.getElementById('screen-lobbies').style.display = 'none';
                document.getElementById('controller-overlay').style.display = 'flex';
                document.getElementById('controller-game-name').innerText = "Подключен к: " + gameTitle;
            };

            // Функция поиска живых лобби
            function listenForLobbies() {
                if(!db) return;
                db.collection("lobbies").where("status", "==", "open").onSnapshot(snapshot => {
                    const list = document.getElementById('lobbies-list');
                    document.getElementById('lobby-count').innerText = snapshot.size;
                    
                    if(snapshot.empty) {
                        list.innerHTML = '<p class="text-center text-gray-500 text-xs mt-10">Нет активных игр. Создай свою!</p>';
                        return;
                    }
                    
                    list.innerHTML = '';
                    snapshot.forEach(doc => {
                        const l = doc.data();
                        list.innerHTML += `
                            <div class="game-card">
                                <div>
                                    <h3 class="font-bold text-[#00f0ff] uppercase">${l.title}</h3>
                                    <p class="text-[10px] text-gray-400">Хост ID: ${doc.id}</p>
                                </div>
                                <button onclick="joinGame('${doc.id}', '${l.title}')" class="btn-play bg-pink-600 text-white">ВОЙТИ P2</button>
                            </div>
                        `;
                    });
                });
            }

            // Отправка нажатий с джойстика
            function bindBtn(id, btnName) {
                const el = document.getElementById(id);
                const send = (state) => {
                    if(currentLobby && db && !isHost) {
                        db.collection("lobbies").doc(currentLobby).update({
                            controller2: { btn: btnName, state: state, ts: Date.now() }
                        });
                        if (state && window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                        }
                    }
                };
                el.addEventListener('pointerdown', e => { e.preventDefault(); send(true); });
                el.addEventListener('pointerup', e => { e.preventDefault(); send(false); });
                el.addEventListener('pointerleave', e => { e.preventDefault(); send(false); });
            }

            bindBtn('p-up', 'UP'); bindBtn('p-down', 'DOWN'); bindBtn('p-left', 'LEFT'); bindBtn('p-right', 'RIGHT');
            bindBtn('p-a', 'A'); bindBtn('p-b', 'B'); bindBtn('p-c', 'C'); bindBtn('p-start', 'START');
        });
    </script>
</body>
</html>
