<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <div id="lobby" class="overlay">
        <h1 class="text-3xl font-bold mb-4">PIXEL ARENA</h1>
        <button onclick="startHost()" class="bg-cyan-500 p-4 rounded-xl text-black font-bold mb-2">СОЗДАТЬ ЛОББИ</button>
        <input id="peer-id" placeholder="ID друга" class="p-4 rounded-xl text-black">
        <button onclick="startJoin()" class="bg-zinc-700 p-4 rounded-xl font-bold mt-2">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        const peer = new Peer(null, { host: '/', path: '/peerjs', port: location.port || 443 });
        let conn;

        // Запуск эмулятора
        function boot() {
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/battletoads.bin';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            const s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(s);
        }

        // Хост: создает лобби
        function startHost() {
            peer.on('open', (id) => alert("Твой ID: " + id));
            peer.on('connection', (c) => { 
                conn = c; 
                document.getElementById('lobby').style.display = 'none';
                boot(); 
            });
        }

        // Гость: подключается к ID
        function startJoin() {
            const id = document.getElementById('peer-id').value;
            conn = peer.connect(id);
            document.getElementById('lobby').style.display = 'none';
            boot();
        }
    </script>
</body>
</html>
