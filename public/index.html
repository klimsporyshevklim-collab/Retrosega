<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena Debug v7</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        /* Принудительный размер контейнера */
        #emulator-wrapper { width: 100vw; height: 50vh !important; background: #111; border-bottom: 2px solid #333; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        
        #debug-console { 
            position: absolute; top: 5px; left: 5px; 
            font-size: 8px; color: #00ff00; pointer-events: none; z-index: 2000;
            text-shadow: 1px 1px 1px #000;
        }
        .error-line { color: #ff4444; font-weight: bold; }
        
        .btn-p1 { background: #00f0ff; color: #000; font-weight: bold; padding: 10px; border-radius: 8px; }
        .control-btn { width: 60px; height: 60px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

    <!-- Главное меню -->
    <div id="menu" class="p-6 space-y-6">
        <h1 class="text-cyan-400 font-bold text-xl italic uppercase tracking-tighter">Arena Debug Mode</h1>
        
        <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <h4 class="text-white font-bold mb-4">Battletoads Genesis</h4>
            <div class="flex gap-4">
                <button onclick="window.app.start('battletoads.md', 1)" class="btn-p1 flex-1">HOST ROOM</button>
                <button onclick="window.app.join('battletoads.md')" class="bg-red-600 p-2 rounded text-xs font-bold text-white">JOIN P2</button>
            </div>
        </div>
        <p class="text-[8px] text-zinc-500">Files found on GitHub: battletoads.md, sonic.bin</p>
    </div>

    <!-- Игровой экран -->
    <div id="game-overlay">
        <!-- Журнал событий прямо на экране -->
        <div id="debug-console"></div>

        <div class="h-10 bg-zinc-950 flex justify-between items-center px-4 border-b border-zinc-800">
            <span id="room-id" class="text-[9px] text-cyan-400 font-bold">Waiting...</span>
            <button onclick="location.reload()" class="text-zinc-600 text-[10px]">QUIT</button>
        </div>

        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>

        <!-- Геймпад -->
        <div id="controls" class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around items-center">
            <div class="grid grid-cols-3 gap-2">
                <div></div><button id="up" class="control-btn text-white">▲</button><div></div>
                <button id="left" class="control-btn text-white">◀</button>
                <div class="w-14 h-14 bg-zinc-900 rounded-full border-4 border-zinc-800"></div>
                <button id="right" class="control-btn text-white">▶</button>
                <div></div><button id="down" class="control-btn text-white">▼</button><div></div>
            </div>
            <div class="flex gap-10">
                <button id="btn-a" class="w-16 h-16 bg-red-600 rounded-full font-bold text-white shadow-lg active:scale-90">A</button>
                <button id="start" class="bg-zinc-700 px-6 py-2 rounded font-bold text-[10px] uppercase">START</button>
            </div>
        </div>
    </div>

    <script>
        const debug = document.getElementById('debug-console');
        function log(msg, isError = false) {
            const line = document.createElement('div');
            line.className = isError ? 'error-line' : '';
            line.innerText = `> ${msg}`;
            debug.appendChild(line);
            console.log(msg);
        }

        // Перехват всех ошибок браузера
        window.onerror = (m) => log(`RUNTIME ERROR: ${m}`, true);

        (function() {
            const socket = io();
            let room = null;
            let myPlayerNum = 1;

            socket.on('connect', () => log("Socket connected to Render."));

            window.app = {
                start: function(rom, pNum) {
                    myPlayerNum = pNum;
                    room = Math.random().toString(36).substring(2, 6).toUpperCase();
                    socket.emit('createRoom', room);
                    document.getElementById('menu').style.display = 'none';
                    document.getElementById('game-overlay').style.display = 'flex';
                    document.getElementById('room-id').innerText = `ROOM: ${room}`;
                    log(`Creating room ${room}...`);
                    this.load(rom);
                },
                load: function(romFile) {
                    log(`Loading ROM: ${romFile}`);
                    
                    window.EJS_player = '#game-container';
                    window.EJS_core = 'sega';
                    // Прямой путь к файлу на твоем сервере
                    window.EJS_gameUrl = window.location.origin + '/' + romFile;
                    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                    window.EJS_startOnLoaded = true;

                    const script = document.createElement('script');
                    script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                    
                    script.onload = () => log("Engine loader.js is READY.");
                    script.onerror = () => log("CDN ERROR: Could not download core!", true);
                    
                    document.body.appendChild(script);

                    // Проверка, видит ли браузер файл игры
                    fetch(window.EJS_gameUrl).then(res => {
                        if(res.ok) log("OK: Game file found on server.");
                        else log("ERROR 404: Game file not found!", true);
                    }).catch(e => log(`NET ERROR: ${e.message}`, true));
                }
            };

            // Логика нажатий
            function fireKey(code, isDown) {
                const canvas = document.querySelector('canvas');
                const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { code: code, bubbles: true });
                document.dispatchEvent(event);
                if (canvas) {
                    canvas.focus();
                    canvas.dispatchEvent(event);
                }
            }

            function bind(id, key) {
                const el = document.getElementById(id);
                el.onpointerdown = () => {
                    fire(key, true);
                    if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                };
                el.onpointerup = () => fire(key, false);
            }

            function fire(key, isDown) {
                const codes = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };
                fireKey(codes[key], isDown);
                if(room) socket.emit('inputSync', { roomId: room, player: myPlayerNum, btn: key, state: isDown });
            }

            bind('up', 'UP'); bind('down', 'DOWN'); bind('left', 'LEFT'); bind('right', 'RIGHT');
            bind('btn-a', 'A'); bind('start', 'START');

            socket.on('inputSync', (data) => {
                if(data.player !== myPlayerNum) {
                    const codes = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };
                    fireKey(codes[data.btn], data.state);
                }
            });
        })();
    </script>
</body>
</html>
