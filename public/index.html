<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena Mirror Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100vw; height: 50vh !important; background: #000; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 65px; height: 65px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #333; touch-action: none; color: #0f0; }
        .ctrl-btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }
        #status-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,255,0,0.1); color: #0f0; font-size: 8px; padding: 4px; z-index: 10001; pointer-events: none; text-align: center; border-bottom: 1px solid #0f0; }
    </style>
</head>
<body class="flex flex-col h-screen bg-zinc-950">

    <div id="status-bar">Система: Готова</div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <main id="menu" class="flex-1 p-6 flex flex-col items-center justify-center space-y-8">
        <h1 class="text-cyan-500 text-4xl font-black italic tracking-tighter uppercase text-center">PIXEL ARENA</h1>
        
        <div class="bg-zinc-900 p-8 rounded-[2.5rem] border border-zinc-800 space-y-6 w-full max-w-sm text-center shadow-2xl">
            <div class="text-6xl mb-4">🐸</div>
            <h4 class="text-white font-bold uppercase text-xl">Battletoads</h4>
            
            <div class="flex flex-col gap-3">
                <button onclick="app.start('battletoads.bin', true)" class="bg-white text-black font-black py-4 rounded-2xl uppercase text-xs">Solo Play</button>
                <div class="flex gap-2">
                    <button onclick="app.create()" class="bg-cyan-500 text-black font-black py-3 rounded-2xl flex-1 text-[10px] uppercase">Create Lobby</button>
                    <button onclick="app.join()" class="bg-zinc-800 font-bold py-3 rounded-2xl flex-1 text-[10px] uppercase text-white border border-zinc-700">Join P2</button>
                </div>
            </div>
        </div>
    </main>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-overlay">
        <div class="h-10 bg-zinc-950 border-b border-white/5 flex justify-between items-center px-4">
            <span id="game-tag" class="text-[10px] font-bold text-white uppercase tracking-widest">Live Session</span>
            <button onclick="location.reload()" class="bg-red-900/20 text-red-500 text-[8px] px-3 py-1 rounded-full font-bold">QUIT</button>
        </div>

        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>

        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6">
                    <button class="ctrl-btn bg-red-600 border-red-400 text-white font-bold" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-3 px-6 rounded-2xl text-[10px] font-bold text-white border border-zinc-700 uppercase tracking-widest" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let playerNum = 1; 
        let isSolo = true;

        // Раскладки для Sega (Genesis Plus GX)
        // P1: Стрелки + X (A), Z (B), C (C), Enter (Start)
        const mapP1 = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };
        // P2: WASD + F (A), G (B), H (C), Shift (Start)
        const mapP2 = { UP: "KeyW", DOWN: "KeyS", LEFT: "KeyA", RIGHT: "KeyD", A: "KeyF", START: "ShiftLeft" };

        const log = (m) => document.getElementById('status-bar').innerText = "Система: " + m;

        window.app = {
            start: function(rom, solo) {
                isSolo = solo; playerNum = 1; this.load(rom);
            },
            create: function() {
                isSolo = false; playerNum = 1;
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                socket.emit('createRoom', currentRoom);
                alert("ID комнаты: " + currentRoom + "\nЖдите подключения игрока 2");
            },
            join: function() {
                const code = prompt("Введите ID:");
                if(!code) return;
                isSolo = false; playerNum = 2;
                currentRoom = code.toUpperCase();
                socket.emit('joinRoom', currentRoom);
            },
            load: async function(romFile = 'battletoads.bin') {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';
                document.getElementById('game-tag').innerText = isSolo ? 'SOLO' : `ROOM: ${currentRoom} (P${playerNum})`;

                const res = await fetch(window.location.origin + '/' + romFile);
                const blob = await res.blob();
                
                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = URL.createObjectURL(blob);
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        socket.on('syncStart', () => { app.load(); });

        function fireKey(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { code: code, key: code, bubbles: true });
            if (canvas) { canvas.focus(); canvas.dispatchEvent(event); }
            document.dispatchEvent(event);
        }

        // ПРИЕМ СИГНАЛОВ
        socket.on('inputSync', (data) => {
            if (isSolo) return;
            // Самое важное: Гость (P2) должен нажимать кнопки P1 в своем эмуляторе,
            // если пришел сигнал от P1. Так меню будет двигаться у обоих!
            const targetMap = (data.player === 1) ? mapP1 : mapP2;
            fireKey(targetMap[data.btn], data.state);
        });

        // ОТПРАВКА СИГНАЛОВ
        function bind(id, btnName) {
            const el = document.getElementById(id);
            const handle = (isDown) => {
                const myMap = (playerNum === 1) ? mapP1 : mapP2;
                fireKey(myMap[btnName], isDown); // Нажали у себя
                
                if (!isSolo && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: playerNum, btn: btnName, state: isDown });
                }
            };
            el.onpointerdown = (e) => { e.preventDefault(); handle(true); };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
        }

        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
