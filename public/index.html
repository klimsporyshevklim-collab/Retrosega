<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        button { padding: 20px 40px; background: #00f0ff; color: #000; border-radius: 15px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <button id="btn">ИГРАТЬ В BATTLETOADS</button>

    <script>
        const btn = document.getElementById('btn');
        // Ссылка на сам сайт, чтобы он открылся снаружи
        const siteUrl = "https://tg-game-arena.onrender.com/?play=true";

        btn.onclick = () => {
            // Если мы внутри Телеграма, выкидываем игрока в браузер
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(siteUrl);
            } else {
                // Если мы уже в браузере, просто грузим игру
                startEmulator();
            }
        };

        // Запуск эмулятора (если параметр play=true)
        function startEmulator() {
            document.body.innerHTML = '<div id="game-container" style="width:100vw; height:100vh;"></div>';
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/battletoads.bin';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            
            const s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(s);
        }

        // Автозапуск при переходе по ссылке
        window.onload = () => {
            if (new URLSearchParams(window.location.search).get('play') === 'true') {
                startEmulator();
            }
        };
    </script>
</body>
</html>
