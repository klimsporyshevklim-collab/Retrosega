<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Pixel Arena</title></head>
<body>
    <div id="game-container" style="width:100vw; height:100vh;"></div>
    
    <!-- Обрати внимание на путь к файлам! -->
    <script src="/loader.js"></script>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = '/data/';
        window.EJS_startOnLoaded = true;

        // Твой "Дебаггер"
        window.onload = () => {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'd') {
                    console.log("Memory dump triggered");
                    // Проверка, видит ли эмулятор память
                    console.log(window.EJS_emulator.memory);
                }
            });
        };
    </script>
</body>
</html>
