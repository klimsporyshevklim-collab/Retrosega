<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena</title>
    <script src="/loader.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex: 1; width: 100%; }
        .debug-console { color: #0f0; font-size: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="log" class="debug-console">Loading...</div>

    <script>
        const log = (m) => document.getElementById('log').innerHTML += m + "<br>";
        
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        // Путь к файлу в public/
        window.EJS_gameUrl = '/battletoads.md'; 
        // Указываем папку data, которая лежит в public/
        window.EJS_pathtodata = '/data/'; 
        window.EJS_startOnLoaded = true;

        // Проверка наличия файлов перед стартом
        fetch('/battletoads.md')
            .then(res => {
                if(!res.ok) log("Ошибка: Battletoads.md не найден на сервере (404)");
                else log("Файл Battletoads.md найден!");
            });

        log("Запуск EmulatorJS...");
    </script>
</body>
</html>
