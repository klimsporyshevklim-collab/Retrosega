<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; }
        #game-container { width: 100vw; height: 100vh; display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .btn { background: #00f0ff; color: #000; padding: 20px; width: 80%; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="menu">
        <button class="btn" onclick="runHost()">СОЗДАТЬ ИГРУ</button>
        <button class="btn" onclick="runClient()">ВОЙТИ В ИГРУ</button>
    </div>
    <div id="game-container"></div>

    <script>
        const config = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com" };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        let lobbyId = "ROOM1";

        function startEngine() {
            document.getElementById('menu').style.display = 'none';
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/sonic.bin';
            window.EJS_pathtodata = '/data/';
            const s = document.createElement('script');
            s.src = '/data/loader.js';
            document.body.appendChild(s);
        }

        window.runHost = () => {
            db.collection("lobbies").doc(lobbyId).set({ btn: null });
            startEngine();
            db.collection("lobbies").doc(lobbyId).onSnapshot(doc => {
                const d = doc.data();
                if(d && d.btn) {
                    const code = { A: "KeyX", B: "KeyZ", C: "KeyC", UP: "ArrowUp" }[d.btn];
                    if(code) {
                        window.dispatchEvent(new KeyboardEvent('keydown', { code }));
                        setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code })), 100);
                    }
                }
            });
        };

        window.runClient = () => {
            document.getElementById('menu').innerHTML = `
                <button onclick="send('UP')" class="btn" style="height:100px">UP</button>
                <button onclick="send('A')" class="btn" style="height:100px; background:red">A</button>
            `;
        };

        window.send = (b) => {
            db.collection("lobbies").doc(lobbyId).update({ btn: b, ts: Date.now() });
        };
    </script>
</body>
</html>
