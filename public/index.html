<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena - True Netplay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #09090b; z-index: 10; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; }
        
        #screen-game { display: none; position: absolute; inset: 0; flex-direction: column; background: #000; z-index: 20; }
        #game-container { width: 100vw; height: 100vh; background: #000; }
        
        /* Инструкция поверх игры для мультиплеера */
        #netplay-instruction { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid #00f0ff; padding: 15px; border-radius: 10px; z-index: 1000; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. МЕНЮ ТЕЛЕГРАМА -->
    <div id="screen-tg" class="screen active">
        <h1 class="text-cyan-400 text-4xl font-black italic uppercase mb-8">PIXEL ARENA</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm shadow-[0_0_20px_rgba(0,240,255,0.2)]">
            <div class="text-6xl mb-6">🐸</div>
            <button onclick="app.launchSolo()" class="bg-zinc-800 text-white font-bold py-4 rounded-xl w-full uppercase mb-4 border border-zinc-700">Одиночная игра (ТГ)</button>
            <button onclick="app.goExternal()" class="bg-cyan-500 text-black font-black py-4 rounded-xl w-full uppercase shadow-lg">Сетевой Турнир (PVP)</button>
        </div>
    </div>

    <!-- 2. МЕНЮ ЛОББИ -->
    <div id="screen-lobby" class="screen">
        <h1 class="text-cyan-400 text-2xl font-black uppercase mb-8 border-b-2 border-cyan-500 pb-2">ТУРНИРНОЕ ЛОББИ</h1>
        <div class="flex gap-4 w-full max-w-sm">
            <button onclick="app.createLobby()" class="bg-cyan-500 text-black font-black py-5 rounded-xl flex-1 uppercase text-xs shadow-lg">Создать</button>
            <button onclick="app.showJoin()" class="bg-zinc-800 text-white font-bold py-5 rounded-xl flex-1 uppercase text-xs border border-zinc-700">Войти по ID</button>
        </div>
    </div>

    <!-- 3. ОЖИДАНИЕ ХОСТА -->
    <div id="screen-wait" class="screen">
        <div class="text-cyan-400 text-lg animate-pulse mb-6 font-bold uppercase">Ждем соперника...</div>
        <p class="text-zinc-500 text-xs mb-2 uppercase">Продиктуй этот код:</p>
        <div id="room-code" class="text-5xl font-black text-white bg-zinc-900 py-6 px-10 rounded-2xl tracking-[0.2em] border border-zinc-800">----</div>
    </div>

    <!-- 4. ВВОД КОДА -->
    <div id="screen-join" class="screen">
        <h3 class="text-white font-bold mb-4 uppercase">Вход в Турнир</h3>
        <input id="join-input" type="text" class="w-full max-w-xs bg-black border border-zinc-700 p-4 rounded-xl text-center font-black text-3xl uppercase text-cyan-400 mb-6 outline-none" maxlength="4" placeholder="КОД">
        <button onclick="app.joinLobby()" class="w-full max-w-xs bg-cyan-500 text-black font-black py-4 rounded-xl uppercase shadow-lg">Подключиться</button>
    </div>

    <!-- 5. ИГРОВОЙ ЭКРАН -->
    <div id="screen-game">
        <!-- Инструкция для Мультиплеера (появится только в PVP) -->
        <div id="netplay-instruction" style="display: none;">
            <p class="text-cyan-400 font-bold mb-2 uppercase text-sm">Связь установлена!</p>
            <p id="instruction-text" class="text-white text-xs mb-4"></p>
            <button onclick="this.parentElement.style.display='none'" class="bg-zinc-800 text-white px-4 py-2 rounded font-bold text-xs uppercase border border-zinc-700">Я ПОНЯЛ (Скрыть)</button>
        </div>
        
        <div id="game-container"></div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let playerNum = 1; 

        window.app = {
            switch: function(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                if(id !== 'screen-game') document.getElementById('screen-game').style.display = 'none';
                
                if (id === 'screen-game') {
                    document.getElementById('screen-game').style.display = 'flex';
                } else {
                    document.getElementById(id).classList.add('active');
                }
            },
            
            launchSolo: function() {
                this.loadEmulator(true);
            },
            
            goExternal: function() {
                const url = window.location.origin + '?mode=netplay';
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.openLink(url);
                else window.location.href = url;
            },

            createLobby: function() {
                playerNum = 1;
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('room-code').innerText = currentRoom;
                this.switch('screen-wait');
                socket.emit('createRoom', currentRoom);
            },

            showJoin: function() { this.switch('screen-join'); },
            
            joinLobby: function() {
                const code = document.getElementById('join-input').value.toUpperCase();
                if(code.length !== 4) return;
                playerNum = 2;
                currentRoom = code;
                socket.emit('joinRoom', currentRoom);
            },

            loadEmulator: function(isSolo = false) {
                this.switch('screen-game');

                if (!isSolo) {
                    // Показываем инструкцию для подключения
                    const instBox = document.getElementById('netplay-instruction');
                    const instText = document.getElementById('instruction-text');
                    instBox.style.display = 'block';
                    
                    if (playerNum === 1) {
                        instText.innerHTML = `1. Нажми кнопку <b class="text-cyan-400">МЕНЮ</b> (внизу экрана)<br>2. Выбери <b class="text-cyan-400">Netplay</b> -> <b class="text-cyan-400">Host Session</b><br>3. Продиктуй новый код другу!`;
                    } else {
                        instText.innerHTML = `1. Нажми кнопку <b class="text-cyan-400">МЕНЮ</b> (внизу экрана)<br>2. Выбери <b class="text-cyan-400">Netplay</b> -> <b class="text-cyan-400">Join Session</b><br>3. Введи код от Хоста!`;
                    }
                }

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = '/battletoads.bin'; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
                window.EJS_startOnLoaded = true;
                window.EJS_VirtualGamepad = true; // Включаем родные мобильные кнопки!

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'netplay') {
                app.switch('screen-lobby');
            }
        };

        socket.on('syncStart', () => {
            app.loadEmulator(false);
        });
    </script>
</body>
</html>
