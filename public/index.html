<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena</title>
    <!-- Подключаем ТВОИ локальные файлы из репозитория -->
    <link rel="stylesheet" href="/data/emulator.css">
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="debug" style="position:fixed; top:0; color:lime; font-size:10px;"></div>

    <script>
        const log = (m) => document.getElementById('debug').innerHTML += m + "<br>";
        
        // 1. Указываем путь к ТВОИМ локальным файлам
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.md'; 
        window.EJS_pathtodata = '/data/'; // Путь к папке data в public/
        window.EJS_startOnLoaded = true;

        log("Загрузка твоего simple-loader.js...");

        // 2. Грузим ТВОЙ loader
        const s = document.createElement('script');
        s.src = '/simple-loader.js';
        
        s.onload = () => log("OK: simple-loader.js загружен.");
        s.onerror = () => log("ERROR: Не найден /simple-loader.js!", true);
        
        document.body.appendChild(s);
    </script>
</body>
</html>
