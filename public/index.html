<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #emulator-wrapper { width: 100vw; height: 50vh; background: #111; position: relative; border-bottom: 2px solid #333; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 65px; height: 65px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #444; touch-action: none; }
        .ctrl-btn:active { background: #444; transform: scale(0.9); }
        #debug { position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.8); font-size: 10px; padding: 5px; z-index: 10000; width: 100%; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="debug">Инициализация...</div>

    <div id="setup-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">
        <h1 class="text-cyan-400 text-2xl font-bold italic">BATTLETOADS ARENA</h1>
        <button onclick="startApp()" class="bg-cyan-500 text-black font-black px-10 py-5 rounded-xl shadow-lg shadow-cyan-500/20 text-xl">
            ЗАПУСТИТЬ ИГРУ
        </button>
        <p class="text-zinc-500 text-[10px]">Нажми кнопку, если видишь черный экран</p>
    </div>

    <div id="game-overlay" class="hidden flex-col h-full">
        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>
        
        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" onpointerdown="fire('ArrowUp', true)" onpointerup="fire('ArrowUp', false)">▲</button><div></div>
                    <button class="ctrl-btn" onpointerdown="fire('ArrowLeft', true)" onpointerup="fire('ArrowLeft', false)">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" onpointerdown="fire('ArrowRight', true)" onpointerup="fire('ArrowRight', false)">▶</button>
                    <div></div><button class="ctrl-btn" onpointerdown="fire('ArrowDown', true)" onpointerup="fire('ArrowDown', false)">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6">
                    <button class="ctrl-btn bg-red-600 border-red-400" onpointerdown="fire('KeyX', true)" onpointerup="fire('KeyX', false)">A</button>
                    <button class="bg-zinc-800 py-2 px-4 rounded text-[10px] font-bold" onpointerdown="fire('Enter', true)" onpointerup="fire('Enter', false)">START</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const debug = document.getElementById('debug');
        function log(m) { debug.innerText = m; console.log(m); }

        function startApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-overlay').classList.remove('hidden');
            loadEmulator();
        }

        function loadEmulator() {
            log("Загрузка ядра...");
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            // Используем прямой путь. Файл ДОЛЖЕН быть в папке public
            window.EJS_gameUrl = '/battletoads.md'; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;

            const s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            s.onload = () => log("Эмулятор готов. Нажми START");
            s.onerror = () => log("Ошибка загрузки Loader.js");
            document.body.appendChild(s);
        }

        function fire(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { code: code, bubbles: true });
            document.dispatchEvent(event);
            if (canvas) {
                canvas.focus();
                canvas.dispatchEvent(event);
            }
            if (isDown && window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html>
