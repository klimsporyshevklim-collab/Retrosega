<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Arena Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        .btn { background: #00f0ff; color: #000; padding: 20px; border-radius: 8px; width: 80%; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; margin: 10px; }
        #game-container { width: 100vw; height: 100vh; background: #000; display: none; }
        #controller-ui { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
    </style>
</head>
<body>

    <div id="menu" style="display:flex; flex-direction:column; align-items:center; height:100vh; justify-content:center;">
        <h1 style="color:#00f0ff; font-size: 24px; margin-bottom: 20px;">PIXEL ARENA</h1>
        <button class="btn" onclick="startHost()">СОЗДАТЬ ИГРУ (HOST)</button>
        <button class="btn bg-pink-500" onclick="startClient()">ВОЙТИ В ИГРУ (P2)</button>
    </div>

    <div id="game-container"></div>

    <div id="controller-ui">
        <h2 style="color:yellow">ДЖОЙСТИК P2</h2>
        <button onclick="send('ArrowUp')" class="btn" style="width:100px;">UP</button>
        <button onclick="send('KeyX')" class="btn" style="width:100px; background:red;">A</button>
        <button onclick="send('KeyZ')" class="btn" style="width:100px; background:yellow;">B</button>
    </div>

    <script>
        // ТВОИ РЕАЛЬНЫЕ КЛЮЧИ ИНТЕГРИРОВАНЫ
        const firebaseConfig = {
            projectId: "studio-8235565247-f8a50",
            appId: "1:924081428998:web:8c62d7a8df8676cb7e8187",
            apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo",
            authDomain: "studio-8235565247-f8a50.firebaseapp.com",
            messagingSenderId: "924081428998"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let lobbyId = "ROOM1";

        window.startHost = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Запуск эмулятора
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/sonic.bin';
            window.EJS_pathtodata = '/data/';
            const s = document.createElement('script');
            s.src = '/data/loader.js';
            document.body.appendChild(s);

            // Слушаем Firebase
            db.collection("lobbies").doc(lobbyId).onSnapshot(doc => {
                const d = doc.data();
                if(d && d.btn) {
                    window.dispatchEvent(new KeyboardEvent('keydown', { code: d.btn }));
                    setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: d.btn })), 100);
                }
            });
        };

        window.startClient = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('controller-ui').style.display = 'flex';
        };

        window.send = (btn) => {
            db.collection("lobbies").doc(lobbyId).update({ btn: btn, ts: Date.now() });
        };
    </script>
</body>
</html>
