<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DEBUG V9</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 10px; font-size: 12px; }
        .err { color: #ff0000; }
        .ok { color: #00ff00; }
    </style>
</head>
<body>
    <div id="log">Запуск проверки...</div>
    <script>
        const log = (m, isErr) => document.getElementById('log').innerHTML += `<div class="${isErr ? 'err' : 'ok'}">${m}</div>`;
        
        async function check() {
            const files = ['/loader.js', '/battletoads.md', '/data/'];
            for(let f of files) {
                try {
                    const res = await fetch(f);
                    if(res.ok) log("✅ Файл найден: " + f);
                    else log("❌ ОШИБКА 404: " + f, true);
                } catch(e) { log("❌ ОШИБКА СЕТИ: " + f, true); }
            }
        }
        check();
    </script>
</body>
</html>
