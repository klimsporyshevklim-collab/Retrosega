<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Arena Debugger</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: monospace; }
        #game-container { width: 100vw; height: 100vh; }
        #debug-panel { position: fixed; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); border: 2px solid red; padding: 15px; font-size: 12px; color: #ff0000; z-index: 9999; }
    </style>
</head>
<body>
    <div id="debug-panel" style="display:none;"></div>
    <div id="game-container"></div>

    <script>
        const debug = document.getElementById('debug-panel');
        function log(msg) {
            debug.style.display = 'block';
            debug.innerText += "\n> " + msg;
            console.log(msg);
        }

        // Перехват ошибок
        window.onerror = (m) => log("FATAL: " + m);

        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/sonic.bin';
        window.EJS_pathtodata = '/data/';
        
        // Мониторинг загрузки
        log("Загрузка loader.js...");
        const s = document.createElement('script');
        s.src = '/data/loader.js';
        s.onerror = () => log("Ошибка: /data/loader.js не найден!");
        s.onload = () => log("loader.js загружен. Ждем WASM...");
        document.body.appendChild(s);
    </script>
</body>
</html>
