<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        button { padding: 20px 40px; background: #00f0ff; color: #000; border-radius: 15px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">ИГРАТЬ В BATTLETOADS</button>

    <script>
        const btn = document.getElementById('btn');
        // Ссылка на ТВОЙ сайт (не в Телеграме)
        const gameUrl = "https://www.retrogames.cc/embed/28169-battletoads-world.html";

        btn.onclick = () => {
            // Если мы в Телеграме — выбрасываем игрока в браузер
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(gameUrl);
            } else {
                // Если мы уже в браузере — просто переходим
                window.location.href = gameUrl;
            }
        };
    </script>
</body>
</html>
