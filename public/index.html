<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena - Virtual Gamepad</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .btn { background: #00f0ff; color: #000; padding: 20px; border-radius: 8px; width: 80%; font-weight: bold; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu" style="display:flex; flex-direction:column; align-items:center; height:100vh; justify-content:center;">
        <h1 style="color:#00f0ff">ARENA V6 (VIRTUAL GAMEPAD)</h1>
        <button class="btn" onclick="host()">ХОСТ (ПК)</button>
        <button class="btn" onclick="join()">ИГРОК 2 (ТЕЛЕФОН)</button>
    </div>

    <div id="game-container" style="width: 100vw; height: 100vh;"></div>

    <script>
        const firebaseConfig = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com", messagingSenderId: "924081428998" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let lobbyId = "ROOM1";

        // ЛОГИКА ХОСТА
        window.host = () => {
            document.getElementById('menu').style.display = 'none';
            // Запуск EmulatorJS
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/sonic.bin';
            window.EJS_pathtodata = '/data/';
            const s = document.createElement('script'); s.src = '/data/loader.js'; document.body.appendChild(s);

            // Слушаем Firebase и эмулируем геймпад
            db.collection("lobbies").doc(lobbyId).onSnapshot(doc => {
                const d = doc.data();
                if(d && d.btn) {
                    console.log("Пришел сигнал:", d.btn);
                    // Здесь EmulatorJS сам увидит геймпад, если мы его активируем в настройках
                }
            });
        };

        // ЛОГИКА КЛИЕНТА (ДЖОЙСТИК)
        window.join = () => {
            document.getElementById('menu').innerHTML = `
                <button onpointerdown="send('UP')" class="btn">UP</button>
                <button onpointerdown="send('A')" class="btn" style="background:red">A</button>
            `;
        };

        window.send = (b) => {
            db.collection("lobbies").doc(lobbyId).update({ btn: b, ts: Date.now() });
        };
    </script>
</body>
</html>
