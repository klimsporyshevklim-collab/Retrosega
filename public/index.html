<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena - Matrix Hack</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        .ui { position: fixed; top: 10px; left: 10px; z-index: 100; }
        button { padding: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui" id="menu">
        <button onclick="host()">ХОСТ (ПК)</button>
        <button onclick="client()">ДЖОЙСТИК (ТЕЛЕФОН)</button>
    </div>

    <div id="game-container"></div>

    <!-- Интерфейс джойстика (скрыт по умолчанию) -->
    <div id="joy-ui" style="display:none; position:fixed; bottom:20px; width:100%; justify-content:center; gap:20px; z-index:200;">
        <button onpointerdown="send(12, true)" onpointerup="send(12, false)">UP</button>
        <button onpointerdown="send(13, true)" onpointerup="send(13, false)">DOWN</button>
        <button onpointerdown="send(0, true)" onpointerup="send(0, false)" style="background:red">A</button>
    </div>

    <script>
        // ❌ ВСТАВЬ КЛЮЧИ FIREBASE ❌
        const firebaseConfig = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com", messagingSenderId: "924081428998" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const LOBBY = "ROOM1";

        // ХОСТ
        window.host = () => {
            document.getElementById('menu').style.display = 'none';
            // Запуск
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/sonic.bin';
            window.EJS_pathtodata = '/data/';
            const s = document.createElement('script');
            s.src = '/data/loader.js';
            document.body.appendChild(s);

            // Слушаем Firebase и меняем ВИРТУАЛЬНЫЙ ГЕЙМПАД
            db.collection("lobbies").doc(LOBBY).onSnapshot(doc => {
                const d = doc.data();
                if(d && window.VirtualPad) {
                    // btn - это индекс кнопки (0=A, 1=B, 12=UP...)
                    // state - нажата (true) или нет (false)
                    window.VirtualPad.buttons[d.btn] = { 
                        pressed: d.state, 
                        value: d.state ? 1 : 0 
                    };
                    window.VirtualPad.timestamp = Date.now(); // Обновляем время, чтобы эмулятор увидел изменение
                }
            });
        };

        // КЛИЕНТ
        window.client = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('joy-ui').style.display = 'flex';
        };

        window.send = (btnIndex, isPressed) => {
            db.collection("lobbies").doc(LOBBY).update({ 
                btn: btnIndex, 
                state: isPressed,
                ts: Date.now() 
            });
        };
    </script>
</body>
</html>
