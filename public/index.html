<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Web Remake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #200020; overflow: hidden; font-family: monospace; }
        #ui { position: absolute; top: 10px; left: 10px; color: gold; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 10; font-size: 20px; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; px: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.3); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; user-select: none; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(0, 255, 0, 0.5); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="ui">SCORE: 0 <br> RINGS: 0</div>
    <div id="game-container"></div>

    <div class="controls">
        <div style="display:flex; gap:15px; margin-left: 20px;">
            <div id="btn-left" class="btn">⬅️</div>
            <div id="btn-right" class="btn">➡️</div>
        </div>
        <div id="btn-jump" class="btn" style="border-color:#ff003c; margin-right: 20px;">🅰️</div>
    </div>

    <script>
        // СПРАЙТ СОНИКА (Вшит прямо в код, чтобы не качать файлы)
        const SONIC_SPRITE_URL = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAADFBMVEUAAAAAAAD///8A/wD/AADI2Z/2AAAAAXRSTlMAQObYZgAAAF1JREFUeNNtkmEKADEIA837X3nhFwyl2A/FhnmR10lV86O52ZG52d6A+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+JmB+J0Bf48K8X8M6noAAAAASUVORK5CYII=';
        
        // СПРАЙТ ЗЕМЛИ (Green Hill Zone)
        const GROUND_SPRITE_URL = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEUAAAD///+l2Z/dAAAAAnRSTlMA/1uRIrUAAAAWJREFUeNpjYBgFo2AUjIJRMApGwSgAAyYAAyAAA1l01QAAAABJRU5ErkJggg==';

        class MainScene extends Phaser.Scene {
            preload() {
                // Загружаем картинки из Base64 строк выше
                this.textures.addBase64('sonic', SONIC_SPRITE_URL);
                this.textures.addBase64('ground', GROUND_SPRITE_URL);
            }

            create() {
                // Фон (Небо)
                this.cameras.main.setBackgroundColor('#00a2ff');

                // Создаем пол
                this.platforms = this.physics.add.staticGroup();
                const groundY = this.scale.height - 32;
                
                // Генерируем длинный уровень
                for (let x = 0; x < 2000; x += 32) {
                    let tile = this.platforms.create(x + 16, groundY, 'ground').setScale(1).refreshBody();
                    // Красим пол в коричнево-зеленый (имитация Green Hill)
                    tile.setTint(0x8B4513); 
                }

                // Платформы в воздухе
                this.platforms.create(400, groundY - 100, 'ground').setScale(3, 1).refreshBody().setTint(0x00ff00);
                this.platforms.create(600, groundY - 200, 'ground').setScale(3, 1).refreshBody().setTint(0x00ff00);

                // Игрок (Соник)
                this.player = this.physics.add.sprite(100, 200, 'sonic');
                this.player.setBounce(0.1);
                this.player.setCollideWorldBounds(false); // Пусть бежит бесконечно
                this.physics.add.collider(this.player, this.platforms);

                // Камера следит за игроком
                this.cameras.main.startFollow(this.player);
                this.cameras.main.setBounds(0, 0, 2000, this.scale.height);

                // Управление
                this.cursors = this.input.keyboard.createCursorKeys();
                this.setupTouch();
            }

            update() {
                const speed = 300;
                
                // Движение
                if (this.cursors.left.isDown || this.leftDown) {
                    this.player.setVelocityX(-speed);
                    this.player.setFlipX(true);
                } else if (this.cursors.right.isDown || this.rightDown) {
                    this.player.setVelocityX(speed);
                    this.player.setFlipX(false);
                } else {
                    this.player.setVelocityX(0);
                }

                // Прыжок
                if ((this.cursors.up.isDown || this.jumpDown) && this.player.body.touching.down) {
                    this.player.setVelocityY(-600);
                }

                // Если упал в пропасть
                if (this.player.y > this.scale.height) {
                    this.scene.restart();
                }
            }

            setupTouch() {
                const btnL = document.getElementById('btn-left');
                const btnR = document.getElementById('btn-right');
                const btnJ = document.getElementById('btn-jump');

                const bind = (el, prop) => {
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); this[prop] = true; });
                    el.addEventListener('touchend', (e) => { e.preventDefault(); this[prop] = false; });
                    el.addEventListener('mousedown', () => this[prop] = true);
                    el.addEventListener('mouseup', () => this[prop] = false);
                };

                bind(btnL, 'leftDown');
                bind(btnR, 'rightDown');
                bind(btnJ, 'jumpDown');
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            pixelArt: true, // ВАЖНО: Делает картинку четкой ("пиксельной")
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1200 }, debug: false }
            },
            scene: MainScene
        };

        const game = new Phaser.Game(config);

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
