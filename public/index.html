<!-- Замени скрипт в index.html на этот -->
<script>
    const socket = io(window.location.origin, { transports: ['websocket'] });

    // Проверка, что сокет вообще жив
    socket.on('connect', () => console.log("Соединение с сервером установлено"));

    function create() {
        const id = Math.random().toString(36).substring(2, 6).toUpperCase();
        socket.emit('createRoom', id);
        alert("Код комнаты: " + id);
    }

    function join() {
        const id = document.getElementById('roomId').value.toUpperCase();
        if(!id) return;
        
        // Показываем индикатор
        const btn = event.target;
        btn.innerText = "ПРОВЕРКА...";

        socket.emit('checkRoom', id, (response) => {
            if (response.exists) {
                alert("Комната найдена! Запуск игры...");
                // Тут будет запуск
            } else {
                alert("Ошибка: Комната не найдена");
                btn.innerText = "ПОДКЛЮЧИТЬСЯ";
            }
        });
    }
</script>
