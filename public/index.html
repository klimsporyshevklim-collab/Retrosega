<!DOCTYPE html>
<html>
<head>
    <title>Sonic JS Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #333; margin: 0; overflow: hidden; font-family: monospace; }
        canvas { display: block; margin: 0 auto; background: #87CEEB; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 0 #000; }
        
        /* Кнопки для телефона */
        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: center; gap: 40px; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; font-size: 40px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <button onclick="initGame('host')" style="padding:10px;">СОЗДАТЬ (ПК)</button>
        <button onclick="initGame('client')" style="padding:10px;">ВОЙТИ (ТЕЛЕФОН)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn" ontouchstart="sendInput('left', true)" ontouchend="sendInput('left', false)">⬅️</div>
        <div class="btn" ontouchstart="sendInput('right', true)" ontouchend="sendInput('right', false)">➡️</div>
        <div class="btn" style="border-color:red" ontouchstart="sendInput('jump', true)" ontouchend="sendInput('jump', false)">🅰️</div>
    </div>

<script>
// --- КОНФИГУРАЦИЯ ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Твои ключи
const firebaseConfig = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com", messagingSenderId: "924081428998" };
try { firebase.initializeApp(firebaseConfig); } catch(e){}
const db = firebase.firestore();
const lobbyRef = db.collection("lobbies").doc("SONIC_JS");

let isHost = false;
let p2Input = { left: false, right: false, jump: false };

// --- ФИЗИКА ИГРЫ (ЭТО И ЕСТЬ ПЕРЕПИСАННЫЙ КОД) ---
const GRAVITY = 0.5;
const FRICTION = 0.8;

class Player {
    constructor(color, x, y) {
        this.color = color;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 40;
        this.height = 40;
        this.speed = 5;
        this.jumpPower = -12;
        this.grounded = false;
    }

    update(input) {
        // Управление
        if (input.left) this.vx--;
        if (input.right) this.vx++;
        if (input.jump && this.grounded) {
            this.vy = this.jumpPower;
            this.grounded = false;
        }

        // Физика
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;

        // Пол (Коллизия)
        if (this.y + this.height > canvas.height - 50) {
            this.y = canvas.height - 50 - this.height;
            this.vy = 0;
            this.grounded = true;
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // Глаза (чтобы видеть направление)
        ctx.fillStyle = "white";
        ctx.fillRect(this.x + (this.vx > 0 ? 25 : 5), this.y + 5, 10, 10);
    }
}

const sonic = new Player("blue", 100, 100);
const tails = new Player("orange", 200, 100);

// --- ЛОГИКА МУЛЬТИПЛЕЕРА ---
function initGame(role) {
    document.getElementById('ui').style.display = 'none';
    
    if (role === 'host') {
        isHost = true;
        loop(); // Запускаем игру
        
        // Слушаем P2
        lobbyRef.onSnapshot(doc => {
            const d = doc.data();
            if (d) p2Input = d;
        });
    } else {
        document.getElementById('controls').style.display = 'flex';
        // Клиент ничего не рисует, только шлет кнопки
        document.body.style.background = "#111"; 
        canvas.style.display = "none";
        document.body.innerHTML += "<h1 style='color:white; text-align:center; margin-top:50px'>ТЫ - ТЕЙЛЗ (ОРАНЖЕВЫЙ)</h1>";
    }
}

// Отправка кнопок
window.sendInput = (key, val) => {
    let update = {};
    update[key] = val;
    lobbyRef.set(update, { merge: true });
};

// --- ИГРОВОЙ ЦИКЛ ---
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем землю
    ctx.fillStyle = "green";
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

    // Локальное управление (Стрелочки для Соника)
    const p1Input = {
        left: keys["ArrowLeft"],
        right: keys["ArrowRight"],
        jump: keys["ArrowUp"]
    };

    // Обновляем обоих
    sonic.update(p1Input); // P1 управляется клавиатурой
    tails.update(p2Input); // P2 управляется из Firebase

    sonic.draw();
    tails.draw();

    requestAnimationFrame(loop);
}

// Слушатель клавиатуры
const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

</script>
</body>
</html>
