<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA - Tournament Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .arena-frame { width: 100vw; height: 100vh; border: none; }
        #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #09090b; }
    </style>
</head>
<body>

    <!-- Меню Арены -->
    <div id="overlay">
        <h1 class="text-4xl font-black text-cyan-400 uppercase italic mb-10">PIXEL ARENA</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm text-center">
            <div class="text-6xl mb-6">🐸</div>
            <p class="text-zinc-400 text-xs uppercase mb-6">Турнирная комната Battletoads</p>
            <button id="btn-play" class="bg-cyan-500 text-black font-black py-4 px-8 rounded-xl w-full uppercase shadow-[0_0_20px_rgba(0,240,255,0.3)]">
                ВОЙТИ В ТУРНИР
            </button>
        </div>
    </div>

    <!-- Здесь будет жить наша "Коробка" -->
    <iframe id="arena-iframe" class="arena-frame hidden" src=""></iframe>

    <script>
        const btn = document.getElementById('btn-play');
        const overlay = document.getElementById('overlay');
        const iframe = document.getElementById('arena-iframe');

        btn.onclick = () => {
            overlay.style.display = 'none';
            iframe.classList.remove('hidden');
            
            // Ссылка на профессионально настроенный эмулятор с Netplay
            // Ты можешь поменять её на любую другую, если найдешь более "чистую" версию
            iframe.src = "https://www.retrogames.cc/embed/28169-battletoads-world.html";
        };
    </script>
</body>
</html>
