<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArenaX - Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/custom-sega-loader.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: white; font-family: 'Space Mono', monospace; margin: 0; overflow: hidden; touch-action: none; }
        .font-retro { font-family: 'Orbitron', sans-serif; }
        .btn-action { background: #00f0ff; color: black; font-weight: 800; font-size: 10px; border-radius: 6px; padding: 12px; text-transform: uppercase; border: none; cursor: pointer; width: 100%; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        /* Исправлен размер канваса для исключения черного экрана */
        #game-container { width: 100vw; height: 70vh; background: #111; display: block; image-rendering: pixelated; }
    </style>
</head>
<body>

    <header class="p-4 bg-zinc-950 flex justify-between items-center border-b border-white/5">
        <h1 class="text-white font-retro font-bold text-xs uppercase italic">Arena<span class="text-[#00f0ff]">X</span></h1>
        <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1 rounded-full border border-white/10">
            <i data-lucide="zap" class="w-3 h-3 text-[#00f0ff] fill-[#00f0ff]"></i>
            <span id="ui-balance" class="text-xs font-bold text-white">1000</span>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <div class="bg-zinc-900 p-4 rounded-xl border border-white/10">
            <h3 class="text-white font-bold mb-3 uppercase text-xs italic">Sonic Hedgehog</h3>
            <button onclick="window.app.run('sonic.bin')" class="btn-action">Запустить игру</button>
        </div>
        
        <!-- Окно логов прямо на экране (для отладки) -->
        <div id="debug-box" class="bg-black/50 p-2 rounded text-[8px] font-mono text-gray-500 overflow-y-auto max-h-32">
            System status: Waiting for launch...
        </div>
    </main>

    <div id="game-overlay">
        <div class="h-14 bg-zinc-900 flex justify-between items-center px-4 border-b border-white/10">
            <span class="text-[9px] font-bold text-[#00f0ff] uppercase">Live Session</span>
            <button onclick="location.reload()" class="text-white/30"><i data-lucide="x-circle"></i></button>
        </div>
        <canvas id="game-container"></canvas>
    </div>

    <script>
        (function() {
            var user = null;
            function log(msg) { document.getElementById('debug-box').innerText += "\n> " + msg; }

            // 1. Инициализация Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                var tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                // Пробуем загрузить пользователя, но не блокируем игру если не вышло
                fetch('/api/user-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramUser: tg.initDataUnsafe.user || {id: 1, first_name: "Dev"} })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        user = data.user;
                        document.getElementById('ui-balance').innerText = user.balance;
                        log("User loaded: " + user.username);
                    }
                }).catch(e => log("Server Error: User not loaded"));
            }

            window.app = {
                run: function(rom) {
                    log("Starting emulator...");
                    document.getElementById('game-overlay').style.display = 'flex';
                    
                    if (window.StartCustomEmulator) {
                        window.StartCustomEmulator(rom);
                        log("Core initialized for: " + rom);
                    } else {
                        log("Error: custom-sega-loader.js not found!");
                        alert("Ошибка: Загрузчик не найден!");
                    }
                }
            };
            
            lucide.createIcons();
        })();
    </script>
</body>
</html>
