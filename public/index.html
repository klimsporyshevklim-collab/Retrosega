<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL ARENA</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #error-log { color: red; padding: 20px; white-space: pre-wrap; font-size: 12px; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="game-container"></div>
    
    <script>
        // Детектор ошибок
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').innerText = "ОШИБКА: " + msg + "\nСтрока: " + line;
            return false;
        };
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin'; 
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        window.EJS_netplayServer = "wss://netplay.emulatorjs.org";
    </script>
</body>
</html>
