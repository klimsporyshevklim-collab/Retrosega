<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena</title>
    <style>body { margin: 0; background: #000; }</style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        // Инициализация эмулятора из официального облака
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        
        // ССЫЛКА НА ТВОЙ ФАЙЛ (Берем напрямую с Гитхаба, чтобы Render не блокировал)
        window.EJS_gameUrl = 'https://raw.githubusercontent.com/klimsporyshevklim-collab/Retrosega/main/public/battletoads.md';
        
        // Путь к ядру из официального облака
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        
        const s = document.createElement('script');
        s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(s);
    </script>
</body>
</html>
