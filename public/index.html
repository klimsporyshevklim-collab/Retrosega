<!DOCTYPE html>
<html>
<head>
    <script src="/loader.js"></script>
</head>
<body>
    <div id="game-container" style="width:100vw; height:100vh;"></div>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = '/data/';
        window.EJS_startOnLoaded = true;

        // "Переводчик": выводит дамп памяти в консоль при нажатии клавиши 'D'
        window.EJS_onGameStart = () => {
            window.addEventListener('keydown', (e) => {
                if (e.key === 'd') {
                    // Выгружаем память эмулятора
                    const memory = window.EJS_emulator.memory;
                    console.log("--- DUMP ---");
                    // Выведем первые 100 байт оперативной памяти
                    for(let i=0; i<100; i++) {
                        console.log("Addr: " + i + " Val: " + memory.read(i));
                    }
                }
            });
        };
    </script>
</body>
</html>
