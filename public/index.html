<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        .ui { position: fixed; top: 20px; left: 20px; z-index: 999; }
        button { background: #00f0ff; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui">
        <button onclick="init('sonic.bin')">ИГРАТЬ (HOST)</button>
        <button onclick="showController()" class="bg-pink-500">ДЖОЙСТИК (P2)</button>
    </div>

    <div id="game-container"></div>

    <script>
        // Твои ключи из Firebase
        const config = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com", messagingSenderId: "924081428998" };
        firebase.initializeApp(config);
        const db = firebase.firestore();

        // ЗАПУСК ЭМУЛЯТОРА
        window.init = (rom) => {
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/' + rom;
            window.EJS_pathtodata = '/data/'; // EmulatorJS ищет всё в /data/
            
            const s = document.createElement('script');
            s.src = '/data/loader.js';
            document.body.appendChild(s);

            // СЛУШАЕМ Firebase (только для Хоста)
            db.collection("lobbies").doc("ROOM1").onSnapshot(doc => {
                const d = doc.data();
                if(d && d.btn) {
                    // Эмулятор слушает клавиатуру. Имитируем её!
                    window.dispatchEvent(new KeyboardEvent('keydown', { code: d.btn }));
                    setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: d.btn })), 100);
                }
            });
        };

        // ДЖОЙСТИК
        window.showController = () => {
            document.body.innerHTML = `
                <button onclick="db.collection('lobbies').doc('ROOM1').update({btn: 'ArrowUp'})" style="padding:50px; background:red;">UP</button>
                <button onclick="db.collection('lobbies').doc('ROOM1').update({btn: 'KeyX'})" style="padding:50px; background:blue;">A</button>
            `;
        };
    </script>
</body>
</html>
