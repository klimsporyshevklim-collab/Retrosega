<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena - True Netplay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        
        #screen-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #09090b; padding: 20px; z-index: 10; position: absolute; inset: 0; }
        #screen-game { display: none; position: absolute; inset: 0; background: #000; z-index: 20; }
        #game-container { width: 100vw; height: 100vh; background: #000; }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="screen-menu">
        <h1 class="text-cyan-400 text-4xl font-black italic uppercase mb-8">PIXEL ARENA</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm">
            <div class="text-6xl mb-6 text-center">🐸</div>
            <button onclick="launchSolo()" class="bg-zinc-800 text-white font-bold py-4 rounded-xl w-full uppercase mb-4 border border-zinc-700">Одиночная игра (ТГ)</button>
            <button onclick="launchMultiplayer()" class="bg-cyan-500 text-black font-black py-4 rounded-xl w-full uppercase shadow-[0_0_15px_rgba(0,240,255,0.4)]">Сетевой Турнир (PVP)</button>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ (Наш эмулятор) -->
    <div id="screen-game">
        <div id="game-container"></div>
    </div>

    <script>
        function launchSolo() {
            loadGame();
        }

        function launchMultiplayer() {
            const url = window.location.origin + '?mode=netplay';
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                window.location.href = url;
            }
        }

        function loadGame() {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-game').style.display = 'block';

            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/battletoads.bin'; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            window.EJS_VirtualGamepad = true; // Родные кнопки, чтобы можно было открыть меню

            // === ТА САМАЯ НАСТРОЙКА, КОТОРАЯ ВКЛЮЧАЕТ МЕНЮ NETPLAY ===
            window.EJS_netplayServer = "wss://netplay.emulatorjs.org"; 

            const s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(s);
        }

        // Автозапуск во внешнем браузере
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'netplay') {
                loadGame();
            }
        };
    </script>
</body>
</html>
