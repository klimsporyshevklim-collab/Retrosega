<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Battletoads Tournament Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100vw; height: 50vh !important; background: #000; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 65px; height: 65px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #333; color: #0f0; touch-action: none; }
        .ctrl-btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }
        .room-ui { position: fixed; top: 10px; left: 10px; z-index: 2000; font-size: 10px; background: rgba(0,0,0,0.7); padding: 5px; border: 1px solid #0f0; border-radius: 5px; }
    </style>
</head>
<body class="flex flex-col h-screen bg-zinc-950">

    <!-- МЕНЮ -->
    <main id="menu" class="flex-1 p-6 flex flex-col items-center justify-center space-y-8">
        <h1 class="text-cyan-400 text-4xl font-black italic tracking-tighter uppercase">ARENA TOURNAMENT</h1>
        <div class="bg-zinc-900 p-8 rounded-[2rem] border border-zinc-800 w-full max-w-sm text-center shadow-2xl space-y-6">
            <div class="text-6xl mb-4">🐸</div>
            <h4 class="text-white font-bold uppercase text-lg">Battletoads</h4>
            <div class="flex flex-col gap-3">
                <button onclick="app.startSolo()" class="bg-white text-black font-black py-4 rounded-2xl uppercase text-xs">Одиночная тренировка</button>
                <div class="flex gap-2">
                    <button onclick="app.create()" class="bg-cyan-500 text-black font-black py-3 rounded-2xl flex-1 text-[10px] uppercase">Создать Турнир</button>
                    <button onclick="app.join()" class="bg-zinc-800 font-bold py-3 rounded-2xl flex-1 text-[10px] uppercase text-white border border-zinc-700">Войти по ID</button>
                </div>
            </div>
        </div>
    </main>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-overlay">
        <div id="room-info" class="room-ui">LOBBY: --- | YOU: ---</div>
        <div id="emulator-wrapper"><div id="game-container"></div></div>
        
        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div id="controls-layout" class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800 flex items-center justify-center">
                        <div class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></div>
                    </div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6">
                    <button class="ctrl-btn bg-red-600 border-red-500 text-white font-bold text-2xl" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-3 px-8 rounded-xl text-[10px] font-bold text-white border border-zinc-700 uppercase tracking-widest" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let pNum = 1;
        let isSolo = true;

        // РАСКЛАДКИ ДЛЯ ЭМУЛЯТОРА
        // Мы используем стандартные клавиши RetroArch, чтобы эмулятор их точно понял
        const mapP1 = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };
        const mapP2 = { UP: "KeyW", DOWN: "KeyS", LEFT: "KeyA", RIGHT: "KeyD", A: "KeyF", START: "ShiftLeft" };

        window.app = {
            create: function() {
                isSolo = false; pNum = 1;
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                socket.emit('createRoom', currentRoom);
                alert("ID ТУРНИРА: " + currentRoom + "\nЖдите соперника...");
            },
            join: function() {
                const code = prompt("Введите ID Турнира:");
                if(!code) return;
                isSolo = false; pNum = 2;
                currentRoom = code.toUpperCase();
                socket.emit('joinRoom', currentRoom);
            },
            startSolo: function() {
                isSolo = true; pNum = 1;
                this.load();
            },
            load: async function() {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';
                document.getElementById('room-info').innerText = isSolo ? 'MODE: SOLO' : `LOBBY: ${currentRoom} | PLAYER: ${pNum}`;

                // ГЛУБОКАЯ НАСТРОЙКА ЭМУЛЯТОРА
                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = window.location.origin + '/battletoads.bin?v=' + Date.now();
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                // ВКЛЮЧАЕМ ПОРТ 2 ПРИ ЗАГРУЗКЕ
                window.EJS_onGameStart = function() {
                    console.log("Игра началась, настраиваем порты...");
                    if (window.EJS_emulator && window.EJS_emulator.setSettings) {
                        window.EJS_emulator.setSettings({
                            p2_type: 1 // Принудительно Standard Joypad в порт 2
                        });
                    }
                };

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        // СИНХРОННЫЙ СТАРТ
        socket.on('syncStart', () => {
            console.log("Оба игрока на месте! Запуск...");
            app.load();
        });

        // ФУНКЦИЯ НАЖАТИЯ (ВЗЛОМ)
        function fire(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { 
                code: code, key: code, keyCode: (code === 'Enter' ? 13 : 0), bubbles: true 
            });
            // Шлем и в документ, и в канвас для надежности
            if (canvas) {
                canvas.focus();
                canvas.dispatchEvent(event);
            }
            document.dispatchEvent(event);
        }

        // ПРИЕМ СИГНАЛОВ
        socket.on('inputSync', (data) => {
            if (isSolo) return;
            
            // ЛОГИКА "ЗЕРКАЛА"
            // Если мы получили сигнал от другого игрока:
            if (data.player === 1) {
                // Если нажал Хост - нажимаем у себя как P1
                fire(mapP1[data.btn], data.state);
            } else {
                // Если нажал Гость - нажимаем у себя как P2 (WASD)
                fire(mapP2[data.btn], data.state);
            }
        });

        // ОТПРАВКА СИГНАЛОВ
        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (d) => {
                // Нажимаем у себя локально
                const myMap = (pNum === 1) ? mapP1 : mapP2;
                fire(myMap[k], d);
                
                // Шлем в сеть
                if(!isSolo && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: pNum, btn: k, state: d });
                }
            };
            el.onpointerdown = (e) => { e.preventDefault(); handle(true); if(window.Telegram) Telegram.WebApp.HapticFeedback.impactOccurred('medium'); };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
        }

        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
