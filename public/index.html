<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        button { padding: 25px 50px; background: #00f0ff; border-radius: 20px; font-weight: 900; font-size: 20px; border: none; }
    </style>
</head>
<body>
    <button id="btn">ИГРАТЬ В BATTLETOADS</button>
    <script>
        const btn = document.getElementById('btn');
        // Ссылка на ТВОЙ же сайт, но мы заставим его открыться ВНЕ телеги
        const externalUrl = "https://tg-game-arena.onrender.com/arena.html";

        btn.onclick = () => {
            // "Выбиваем" игрока из клетки Телеграма в свободный браузер
            window.Telegram.WebApp.openLink(externalUrl, { try_instant_view: false });
        };
    </script>
</body>
</html>
