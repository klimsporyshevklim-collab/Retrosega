<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Arena</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; }
        .btn { background: #00f0ff; color: #000; padding: 20px; border-radius: 8px; font-weight: bold; width: 100%; border: none; margin-top: 10px; }
        #lobbies-container { padding: 20px; }
        .lobby-card { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div id="menu">
        <button class="btn" onclick="hostGame()">СОЗДАТЬ ИГРУ</button>
        <div id="lobbies-container">
            <h2 class="text-xs uppercase text-gray-400 mb-4">Доступные игры:</h2>
            <div id="lobbies-list">Загрузка...</div>
        </div>
    </div>
    <div id="game-container" style="width: 100vw; height: 100vh; display: none;"></div>

    <script>
        const firebaseConfig = { projectId: "studio-8235565247-f8a50", appId: "1:924081428998:web:8c62d7a8df8676cb7e8187", apiKey: "AIzaSyBJUydsDT4euRjy5A1EIEQWMtud91FPEFo", authDomain: "studio-8235565247-f8a50.firebaseapp.com", messagingSenderId: "924081428998" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentLobbyId = null;

        // 1. ХОСТ: Создает лобби
        function hostGame() {
            currentLobbyId = Math.random().toString(36).substring(2, 6).toUpperCase();
            db.collection("lobbies").doc(currentLobbyId).set({ 
                status: "open", 
                host: "Игрок 1",
                btn: null,
                ts: Date.now() 
            });
            alert("Комната создана! ID: " + currentLobbyId);
            startEmulator();
            listenForP2();
        }

        // 2. СПИСОК ЛОББИ: Обновляется автоматически
        db.collection("lobbies").where("status", "==", "open").onSnapshot(snapshot => {
            const list = document.getElementById('lobbies-list');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                list.innerHTML += `<div class="lobby-card">
                    <span>Комната ${doc.id}</span>
                    <button class="btn" style="width: auto; padding: 5px 15px;" onclick="joinGame('${doc.id}')">ВОЙТИ</button>
                </div>`;
            });
        });

        // 3. КЛИЕНТ: Вход
        function joinGame(id) {
            currentLobbyId = id;
            document.getElementById('menu').innerHTML = `
                <h2 class="text-center">ВЫ В ЛОББИ ${id}</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <button onclick="sendBtn('ArrowUp')" class="btn">UP</button>
                    <button onclick="sendBtn('ArrowLeft')" class="btn">LEFT</button>
                    <button onclick="sendBtn('ArrowRight')" class="btn">RIGHT</button>
                    <button onclick="sendBtn('ArrowDown')" class="btn">DOWN</button>
                    <button onclick="sendBtn('KeyX')" class="btn" style="background:red">A</button>
                    <button onclick="sendBtn('KeyZ')" class="btn" style="background:yellow">B</button>
                </div>
            `;
        }

        function sendBtn(code) {
            db.collection("lobbies").doc(currentLobbyId).update({ btn: code, ts: Date.now() });
        }

        function startEmulator() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            window.EJS_player = '#game-container';
            window.EJS_core = 'sega';
            window.EJS_gameUrl = '/sonic.bin';
            window.EJS_pathtodata = '/data/';
            const s = document.createElement('script');
            s.src = '/data/loader.js';
            document.body.appendChild(s);
        }

        function listenForP2() {
            db.collection("lobbies").doc(currentLobbyId).onSnapshot(doc => {
                const d = doc.data();
                if(d && d.btn) {
                    window.dispatchEvent(new KeyboardEvent('keydown', { code: d.btn }));
                    setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: d.btn })), 100);
                }
            });
        }
    </script>
</body>
</html>
