<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrosega - Battletoads Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto;
        }
        #menu-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
        #menu-ui div {
            margin: 5px 0;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="menu-ui">
            <div>Connection Status: <span id="connection-status">Disconnected</span></div>
            <div>Player Count: <span id="player-count">0</span></div>
        </div>
        <div id="instructions">
            Press 1 for SOLO mode<br>
            Press 2 for MULTIPLAYER mode
        </div>
    </div>
    <script src="js/BattletoadsPhysics.js"></script>
    <script src="js/GameLogic.js"></script>
    <script src="js/LevelMapLoader.js"></script>
    <script src="game.js"></script>
</body>
</html>
