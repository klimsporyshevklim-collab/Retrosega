<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Arena</title>
    <!-- Подключаем loader напрямую -->
    <script src="/loader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-container { 
            width: 100vw !important; 
            height: 100vh !important; 
            display: block !important;
            position: absolute !important;
            top: 0; left: 0;
        }
        .debug-text { color: #0f0; font-size: 10px; position: absolute; bottom: 10px; left: 10px; z-index: 9999; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="log" class="debug-text">Запуск...</div>

    <script>
        const log = (m) => document.getElementById('log').innerHTML += m + "<br>";
        
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.md'; 
        window.EJS_pathtodata = '/data/'; 
        window.EJS_startOnLoaded = true;

        // Дополнительная проверка, чтобы Telegram не блокировал
        setTimeout(() => {
            log("Попытка инициализации движка...");
        }, 1000);
    </script>
</body>
</html>
