<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena v11.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100vw; height: 50vh !important; background: #111; position: relative; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 60px; height: 60px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid #444; touch-action: none; }
        .ctrl-btn:active { background: #444; transform: scale(0.9); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Главное Меню -->
    <main id="menu" class="flex-1 p-6 flex flex-col items-center justify-center space-y-6">
        <h1 class="text-cyan-400 text-3xl font-bold italic uppercase tracking-tighter">Pixel Arena</h1>
        
        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4 w-full max-w-sm text-center shadow-2xl">
            <div class="text-5xl">🐸</div>
            <h4 class="text-white font-bold uppercase text-lg">Battletoads</h4>
            
            <div class="flex flex-col gap-3">
                <!-- Одиночная игра -->
                <button onclick="app.start('battletoads.bin', true)" class="bg-white text-black font-black py-3 rounded-xl uppercase text-xs">
                    Одиночная игра (Solo)
                </button>
                
                <!-- Мультиплеер -->
                <div class="flex gap-2">
                    <button onclick="app.start('battletoads.bin', false, 1)" class="bg-cyan-500 text-black font-black py-3 rounded-xl flex-1 text-[10px] uppercase">
                        Создать Лобби
                    </button>
                    <button onclick="app.showJoin()" class="bg-red-600 font-bold py-3 rounded-xl flex-1 text-[10px] uppercase text-white">
                        Войти P2
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Модалка входа -->
    <div id="join-modal" class="hidden fixed inset-0 bg-black/95 z-[5000] flex items-center justify-center p-6 text-white">
        <div class="bg-zinc-900 p-6 rounded-2xl border border-cyan-500/50 w-full max-w-xs text-center">
            <h3 class="font-bold mb-4 uppercase text-xs">Введите ID Комнаты</h3>
            <input id="lobby-input" type="text" class="w-full bg-black border border-white/20 p-3 rounded text-center font-bold uppercase mb-4 outline-none" maxlength="4">
            <button id="btn-submit-join" class="w-full bg-cyan-500 text-black font-black py-3 rounded uppercase">Подключиться</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="game-overlay">
        <div class="h-10 bg-zinc-950 border-b border-cyan-500/20 flex justify-between items-center px-4">
            <span id="game-tag" class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest">Sega Mode</span>
            <button onclick="location.reload()" class="text-zinc-500 text-[8px] font-bold uppercase border border-zinc-800 px-2 py-1 rounded">Выход</button>
        </div>
        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>
        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around">
            <div class="flex justify-between items-center w-full max-w-sm mx-auto">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-10 h-10 bg-zinc-900 rounded-full border border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-4 items-center">
                    <button class="ctrl-btn bg-red-600 border-red-400 text-white font-bold" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-2 px-6 rounded text-[10px] font-bold text-white tracking-widest uppercase" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = null;
        let pNum = 1;
        let isSolo = true;

        const keyCodes = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", START: "Enter" };

        window.app = {
            start: function(rom, solo, p = 1) {
                isSolo = solo;
                pNum = p;
                if (!isSolo) {
                    currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                    socket.emit('createRoom', currentRoom);
                    document.getElementById('game-tag').innerText = `LOBBY: ${currentRoom}`;
                } else {
                    document.getElementById('game-tag').innerText = `SOLO PLAY`;
                }
                this.load(rom);
            },
            showJoin: function() {
                document.getElementById('join-modal').classList.remove('hidden');
                document.getElementById('btn-submit-join').onclick = () => {
                    const code = document.getElementById('lobby-input').value.toUpperCase();
                    if(!code) return;
                    currentRoom = code; pNum = 2; isSolo = false;
                    socket.emit('joinRoom', currentRoom);
                    document.getElementById('join-modal').classList.add('hidden');
                    this.load('battletoads.bin');
                };
            },
            load: function(romFile) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game-overlay').style.display = 'flex';

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                // Самый надежный путь для Render:
                window.EJS_gameUrl = window.location.origin + '/' + romFile;
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        function fireKey(code, isDown) {
            const canvas = document.querySelector('canvas');
            const event = new KeyboardEvent(isDown ? 'keydown' : 'keyup', { code, key: code, bubbles: true });
            document.dispatchEvent(event);
            if (canvas) { canvas.focus(); canvas.dispatchEvent(event); }
        }

        socket.on('inputSync', (data) => {
            if(!isSolo && data.player !== pNum) {
                fireKey(keyCodes[data.btn], data.state);
            }
        });

        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (d) => {
                fireKey(keyCodes[k], d);
                if(!isSolo && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: pNum, btn: k, state: d });
                }
            };
            el.onpointerdown = (e) => { 
                e.preventDefault(); handle(true); 
                if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
        }
        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
