<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <style>
        body { margin: 0; background: black; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Принудительно задаем настройки, чтобы не было выпадающего списка
        window.EJS_player = "#game";
        window.EJS_core = "sega"; // Ядро для Genesis
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        
        // Меняй этот путь в зависимости от того, какой ром хочешь запустить
        // СЕЙЧАС СТОИТ BATTLETOADS.MD
        window.EJS_gameUrl = "/battletoads.md"; 
        
        window.EJS_startOnLoaded = true;
    </script>
</body>
</html>
