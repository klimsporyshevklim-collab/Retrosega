<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Kombat Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/custom-sega-loader.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000; color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        .font-retro { font-family: 'Orbitron', sans-serif; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        canvas { width: 100vw; height: 75vh; display: block; image-rendering: pixelated; margin: auto; }
        .btn-main { background: #00f0ff; color: #000; font-weight: 800; padding: 15px; border-radius: 8px; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 bg-zinc-950 flex justify-between items-center border-b border-white/5">
        <h1 class="text-white font-retro text-xs italic tracking-tighter">Arena<span class="text-[#00f0ff]">X</span></h1>
        <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1 rounded-full text-[#00f0ff]">
            <i data-lucide="zap" class="w-3 h-3 fill-[#00f0ff]"></i>
            <span id="ui-balance" class="text-xs font-bold text-white">...</span>
        </div>
    </header>

    <main class="p-6 flex-1 flex flex-col justify-center gap-4">
        <div class="bg-zinc-900 p-6 rounded-2xl border border-white/5 text-center">
            <span class="text-4xl mb-4 block">🦔</span>
            <h2 class="font-retro text-sm mb-6">SONIC GENERATION</h2>
            <button onclick="window.app.start('sonic.bin')" class="btn-main">Играть Solo</button>
        </div>
        <p class="text-[8px] text-zinc-600 text-center uppercase tracking-widest">Система судьи: Вшита в ядро (No VPN required)</p>
    </main>

    <div id="game-overlay">
        <div class="h-14 bg-zinc-950 flex justify-between items-center px-4 border-b border-[#00f0ff]/20">
            <span id="ram-status" class="text-[8px] text-emerald-400 font-bold uppercase animate-pulse">● AI Stream Active</span>
            <div class="flex gap-2">
                <button onclick="window.app.finish()" class="bg-yellow-500 text-black px-3 py-1 text-[9px] font-bold rounded">FINISH & VERIFY</button>
                <button onclick="location.reload()" class="text-white/20"><i data-lucide="x-circle"></i></button>
            </div>
        </div>
        <canvas id="game-container"></canvas>
    </div>

    <script>
        (function() {
            var user = null;
            var matchData = [];
            var matchStart = 0;

            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();

            // Загрузка баланса
            fetch('/api/user-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramUser: window.Telegram.WebApp.initDataUnsafe.user || {id: 1, first_name: "Player"} })
            }).then(r => r.json()).then(d => {
                if(d.success) {
                    user = d.user;
                    document.getElementById('ui-balance').innerText = user.balance;
                }
            });

            window.app = {
                start: function(rom) {
                    document.getElementById('game-overlay').style.display = 'flex';
                    matchStart = Date.now();
                    matchData = []; // Очистка телеметрии
                    
                    // Эмуляция сбора данных (каждые 2 сек)
                    setInterval(() => {
                        if (window.ArenaEngine && window.ArenaEngine.memory) {
                            matchData.push({
                                time_offset: Date.now() - matchStart,
                                score: window.ArenaEngine.readRamByte(0xFE1C) || 0
                            });
                        }
                    }, 2000);

                    if (window.StartCustomEmulator) window.StartCustomEmulator(rom);
                },
                finish: function() {
                    const finalScore = Date.now() - matchStart;
                    alert("Судья проверяет матч...");
                    
                    fetch('/api/verify-match', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            telegramId: user.telegramId,
                            game: 'sonic',
                            score: finalScore,
                            telemetry: matchData
                        })
                    }).then(r => r.json()).then(data => {
                        if(data.status === 'approve') {
                            alert("✅ ПРОВЕРЕНО! Награда зачислена.");
                            document.getElementById('ui-balance').innerText = data.newBalance;
                        } else {
                            alert("❌ ОТКАЗАНО: " + data.reason);
                        }
                        location.reload();
                    });
                }
            };
            lucide.createIcons();
        })();
    </script>
</body>
</html>
