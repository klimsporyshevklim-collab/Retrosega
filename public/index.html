<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Sonic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; top: 10px; left: 10px; color: #00f0ff; font-weight: bold; text-shadow: 0 0 5px #00f0ff; font-size: 12px; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; px: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(0, 240, 255, 0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; user-select: none; margin: 0 10px; }
        .btn:active { background: rgba(0, 240, 255, 0.3); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="status" class="hud">SYSTEM: ONLINE</div>
        <div class="controls">
            <div style="display:flex;">
                <div id="btn-left" class="btn">◀</div>
                <div id="btn-right" class="btn">▶</div>
            </div>
            <div id="btn-jump" class="btn" style="border-color:#ff003c; margin-right: 20px;">🚀</div>
        </div>
    </div>

    <script>
        // --- ТВОЙ ДВИЖОК (ВСТРОЕН ПРЯМО СЮДА) ---
        class NeuralSonicEngine {
            constructor(scene) { this.scene = scene; }

            generateTextures() {
                // 1. Рисуем Соника (Синий круг)
                const graphics = this.scene.make.graphics({ x: 0, y: 0, add: false });
                graphics.fillStyle(0x0055FF, 1);
                graphics.fillCircle(32, 32, 30); // Тело
                graphics.fillStyle(0xFFDAB9, 1); // Мордочка
                graphics.fillCircle(42, 32, 10);
                graphics.generateTexture('sonic_tex', 64, 64);

                // 2. Рисуем Врага (Красный дрон)
                graphics.clear();
                graphics.fillStyle(0x333333, 1);
                graphics.fillCircle(32, 32, 25);
                graphics.fillStyle(0xFF0000, 1); // Глаз
                graphics.fillRect(20, 28, 24, 8);
                graphics.generateTexture('enemy_tex', 64, 64);

                // 3. Рисуем Землю (Трава)
                graphics.clear();
                graphics.fillStyle(0x00aa00, 1); // Зеленый верх
                graphics.fillRect(0, 0, 64, 20);
                graphics.fillStyle(0x654321, 1); // Коричневый низ
                graphics.fillRect(0, 20, 64, 44);
                graphics.generateTexture('ground_tex', 64, 64);
            }
        }

        // --- ИГРОВАЯ ЛОГИКА ---
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#1a1a2e', // Темно-синий (чтобы видеть, что игра загрузилась)
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1500 }, debug: false }
            },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        
        let player, enemy, cursors;
        let leftDown = false, rightDown = false, jumpDown = false;

        function create() {
            try {
                // Запуск движка
                const engine = new NeuralSonicEngine(this);
                engine.generateTextures();

                // Создание уровня (Пол)
                const platforms = this.physics.add.staticGroup();
                // Пол на всю ширину + запас
                for (let x = 0; x < window.innerWidth * 2; x += 64) {
                    platforms.create(x + 32, window.innerHeight - 32, 'ground_tex');
                }
                // Платформы
                platforms.create(400, window.innerHeight - 200, 'ground_tex');
                platforms.create(700, window.innerHeight - 350, 'ground_tex');

                // Игрок
                player = this.physics.add.sprite(100, 200, 'sonic_tex');
                player.setBounce(0.1);
                player.setCollideWorldBounds(true);
                this.physics.add.collider(player, platforms);

                // Враг
                enemy = this.physics.add.sprite(600, 100, 'enemy_tex');
                enemy.body.allowGravity = false; // Летает
                enemy.setCollideWorldBounds(true);
                this.physics.add.overlap(player, enemy, () => {
                    this.cameras.main.shake(100, 0.01); // Эффект удара
                });

                // Камера
                this.cameras.main.startFollow(player);
                this.cameras.main.setBounds(0, 0, window.innerWidth * 2, window.innerHeight);

                // Управление
                setupControls();
                cursors = this.input.keyboard.createCursorKeys();
                
                document.getElementById('status').innerText = "SYSTEM: GAME STARTED";
            } catch (e) {
                document.getElementById('status').innerText = "ERROR: " + e.message;
                document.getElementById('status').style.color = "red";
            }
        }

        function update() {
            if (!player) return;

            // Движение игрока
            if (leftDown || cursors.left.isDown) {
                player.setVelocityX(-400);
            } else if (rightDown || cursors.right.isDown) {
                player.setVelocityX(400);
            } else {
                player.setVelocityX(0);
            }

            // Прыжок (только если на земле)
            if ((jumpDown || cursors.up.isDown) && player.body.touching.down) {
                player.setVelocityY(-800);
            }

            // Простой ИИ Врага (Преследование)
            if (enemy) {
                this.physics.moveToObject(enemy, player, 150);
            }
        }

        function setupControls() {
            const btnL = document.getElementById('btn-left');
            const btnR = document.getElementById('btn-right');
            const btnJ = document.getElementById('btn-jump');

            const set = (el, val) => {
                el.addEventListener('touchstart', (e) => { e.preventDefault(); val(true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); val(false); });
                el.addEventListener('mousedown', (e) => { val(true); });
                el.addEventListener('mouseup', (e) => { val(false); });
            };

            set(btnL, v => leftDown = v);
            set(btnR, v => rightDown = v);
            set(btnJ, v => jumpDown = v);
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
