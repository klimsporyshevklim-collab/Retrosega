<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <style>body { margin: 0; background: black; }</style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Твоя строка Base64 (вставь её вместо многоточия)
        const romBase64 = "ЗДЕСЬ_ДОЛЖНА_БЫТЬ_ТВОЯ_ОГРОМНАЯ_BASE64_СТРОКА"; 

        window.EJS_player = "#game";
        window.EJS_core = "sega";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        
        // Превращаем Base64 обратно в бинарные данные для эмулятора
        fetch('data:application/octet-stream;base64,' + romBase64)
            .then(res => res.blob())
            .then(blob => {
                window.EJS_gameUrl = URL.createObjectURL(blob);
                window.EJS_startOnLoaded = true;
            });
    </script>
</body>
</html>
