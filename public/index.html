<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Direct P2P Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: monospace; overflow: hidden; margin: 0; }
        .btn { padding: 20px; background: #00f0ff; color: #000; font-weight: bold; border-radius: 10px; width: 100%; text-transform: uppercase; }
        .dpad { width: 60px; height: 60px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .act { width: 70px; height: 70px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col h-screen p-6 justify-center">

    <div id="menu" class="space-y-4">
        <h1 class="text-2xl text-center text-[#00f0ff] font-bold">DIRECT P2P</h1>
        <button id="btn-host" class="btn">ХОСТ (ПК)</button>
        <button id="btn-join" class="btn bg-pink-500">ПРИСОЕДИНИТЬСЯ (ТЕЛЕФОН)</button>
    </div>

    <!-- P2 CONTROLLER -->
    <div id="controller" class="hidden h-screen flex-col items-center justify-center gap-6">
        <div class="grid grid-cols-3 gap-2">
            <div></div><button id="up" class="dpad">▲</button><div></div>
            <button id="left" class="dpad">◀</button>
            <div class="w-[60px] h-[60px] bg-zinc-900 rounded-full"></div>
            <button id="right" class="dpad">▶</button>
            <div></div><button id="down" class="dpad">▼</button><div></div>
        </div>
        <div class="flex gap-4">
            <button id="a" class="act bg-red-600">A</button>
            <button id="b" class="act bg-yellow-500">B</button>
        </div>
    </div>

    <script>
        let peerConnection;
        let dataChannel;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // 1. HOST: Создает соединение
        document.getElementById('btn-host').onclick = async () => {
            peerConnection = new RTCPeerConnection(config);
            dataChannel = peerConnection.createDataChannel("gamepad");
            
            dataChannel.onmessage = e => {
                const btn = e.data; // Получаем кнопку
                window.dispatchEvent(new KeyboardEvent('keydown', { code: btn }));
                setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: btn })), 100);
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // ВАЖНО: Мы покажем Offer, который нужно скопировать и вставить на телефон
            const offerStr = JSON.stringify(offer);
            prompt("Скопируй этот код на телефон:", offerStr);
            
            peerConnection.onicecandidate = e => { if(!e.candidate) log("Offer готов!"); };
        };

        // 2. CLIENT: Подключается
        document.getElementById('btn-join').onclick = async () => {
            peerConnection = new RTCPeerConnection(config);
            const offerStr = prompt("Вставь код от Хоста:");
            await peerConnection.setRemoteDescription(JSON.parse(offerStr));
            
            peerConnection.ondatachannel = e => {
                dataChannel = e.channel;
                document.getElementById('menu').style.display = 'none';
                document.getElementById('controller').style.display = 'flex';
            };

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            prompt("Скопируй этот ответ обратно на ПК:", JSON.stringify(answer));
        };

        // Биндинг кнопок (отправка напрямую через DataChannel)
        ['up', 'down', 'left', 'right', 'a', 'b', 'c'].forEach(id => {
            document.getElementById(id).onpointerdown = () => {
                if(dataChannel) dataChannel.send(id.toUpperCase());
            };
        });
    </script>
</body>
</html>
