<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battletoads PvP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center h-screen p-4">
    <h1 class="text-2xl font-bold mb-8 uppercase text-cyan-400">Battletoads Arena</h1>
    
    <!-- КНОПКА ДЛЯ ТЕЛЕГРАМА -->
    <button id="open-browser" class="bg-cyan-500 text-black font-black w-full py-6 rounded-2xl uppercase">
        Открыть в браузере для игры
    </button>

    <div id="game-area" class="hidden w-full h-full">
        <!-- Ссылка на эмулятор с Netplay -->
        <iframe id="game-frame" src="" width="100%" height="100%" allow="gamepad *; microphone *"></iframe>
    </div>

    <script>
        const btn = document.getElementById('open-browser');
        const url = window.location.origin + '/game.html';

        btn.onclick = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                window.location.href = url;
            }
        };

        // Если мы уже в браузере - запускаем игру
        if (window.location.pathname === '/game.html') {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            // Здесь мы используем эмулятор с поддержкой Netplay
            document.getElementById('game-frame').src = "https://www.retrogames.cc/embed/17395-battletoads-usa.html";
        }
    </script>
</body>
</html>
