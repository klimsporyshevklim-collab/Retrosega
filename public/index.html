<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .screen { display: none; width: 100vw; height: 100vh; }
        .active { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН МЕНЮ -->
    <div id="screen-menu" class="screen active p-4">
        <h1 class="text-3xl font-black text-cyan-400 mb-6 uppercase italic text-center">PIXEL ARENA</h1>
        
        <!-- Вкладки -->
        <div class="grid grid-cols-2 gap-2 mb-6 w-full max-w-sm">
            <button onclick="render('SEGA')" class="bg-blue-900 p-3 rounded-lg font-bold text-xs">SEGA</button>
            <button onclick="render('NINTENDO')" class="bg-red-900 p-3 rounded-lg font-bold text-xs">NES</button>
            <button onclick="render('PLAYSTATION')" class="bg-purple-900 p-3 rounded-lg font-bold text-xs">PS1</button>
            <button onclick="render('ARCADE')" class="bg-green-900 p-3 rounded-lg font-bold text-xs">ARCADE</button>
        </div>

        <div id="game-list" class="grid grid-cols-2 gap-3 w-full max-w-sm overflow-y-auto pb-20"></div>
    </div>

    <!-- 2. ЭКРАН ИГРЫ -->
    <div id="screen-game" class="screen">
        <button onclick="closeGame()" class="absolute top-2 left-2 z-50 bg-red-600 px-4 py-2 rounded-full font-bold text-sm">НАЗАД</button>
        <div id="embed-container" class="w-full h-full"></div>
    </div>

    <script>
        const allGames = [
            { name: "Battletoads", system: "SEGA", url: "https://www.retrogames.cc/embed/16901-battletoads-world.html" },
            { name: "Sonic 2", system: "SEGA", url: "https://www.retrogames.cc/embed/17236-sonic-the-hedgehog-2-world-rev-a.html" },
            { name: "Mortal Kombat 3", system: "SEGA", url: "https://www.retrogames.cc/embed/19038-mortal-kombat-3-europe.html" },
            { name: "Super Mario Bros", system: "NINTENDO", url: "https://www.retrogames.cc/embed/16853-super-mario-bros-usa.html" },
            { name: "Contra", system: "NINTENDO", url: "https://www.retrogames.cc/embed/16841-contra-usa.html" },
            { name: "Tekken 3", system: "PLAYSTATION", url: "https://www.retrogames.cc/embed/40238-tekken-3.html" },
            { name: "Crash Bandicoot", system: "PLAYSTATION", url: "https://www.retrogames.cc/embed/40784-crash-bandicoot.html" },
            { name: "Street Fighter II", system: "ARCADE", url: "https://www.retrogames.cc/embed/17395-street-fighter-ii-world-910214.html" },
            { name: "Metal Slug", system: "ARCADE", url: "https://www.retrogames.cc/embed/23611-metal-slug-super-vehicle-001.html" }
        ];

        function render(system) {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            allGames.filter(g => g.system === system).forEach(game => {
                list.innerHTML += `
                    <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700 text-center cursor-pointer" onclick="openGame('${game.url}')">
                        <p class="text-[10px] font-bold">${game.name}</p>
                    </div>`;
            });
        }

        function openGame(url) {
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            document.getElementById('embed-container').innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        }

        function closeGame() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
            document.getElementById('embed-container').innerHTML = '';
        }

        render('SEGA'); // Грузим Сегу по умолчанию
    </script>
</body>
</html>
