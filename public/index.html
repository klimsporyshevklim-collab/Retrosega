<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
        #debug-panel { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.8); color: #0f0; 
            padding: 10px; font-family: monospace; z-index: 999;
        }
    </style>
</head>
<body>
    <div id="debug-panel">DEBUG: Ожидание...</div>
    <div id="game-container"></div>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;

        // "Переводчик" (Bridge)
        window.EJS_onGameStart = () => {
            setInterval(() => {
                const mem = window.EJS_emulator.memory;
                // Читаем несколько адресов памяти
                const val1 = mem.read(0xFFC001);
                const val2 = mem.read(0xFFC002);
                
                // Выводим прямо поверх игры
                document.getElementById('debug-panel').innerText = 
                    "P1_X: " + val1 + "\nP1_Y: " + val2;
            }, 100);
        };
    </script>
</body>
</html>
