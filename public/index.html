<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Arena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #game-container { width: 100vw; height: 50vh; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; background: #111; }
        .btn { background: #333; color: white; padding: 20px; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="controls">
        <button class="btn" onpointerdown="input('UP', true)" onpointerup="input('UP', false)">▲</button>
        <button class="btn" onpointerdown="input('START', true)" onpointerup="input('START', false)">START</button>
        <button class="btn" onpointerdown="input('A', true)" onpointerup="input('A', false)">A</button>
    </div>

    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.md';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        
        const s = document.createElement('script');
        s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        document.body.appendChild(s);

        // Прямая функция управления через EmulatorJS API
        function input(btn, isPressed) {
            if (!window.EJS_emulator) return;
            
            // Внутренние коды EmulatorJS
            const codes = {
                'UP': 38, 'DOWN': 40, 'LEFT': 37, 'RIGHT': 39,
                'A': 88, 'B': 90, 'C': 67, 'START': 13
            };
            
            const e = new KeyboardEvent(isPressed ? 'keydown' : 'keyup', {
                keyCode: codes[btn],
                which: codes[btn],
                bubbles: true
            });
            
            document.dispatchEvent(e);
        }
    </script>
</body>
</html>
