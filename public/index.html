<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace;">
    <div id="debug" style="position:fixed; top:10px; left:10px; z-index:999;">Ожидание...</div>
    <div id="game-container" style="width:100vw; height:100vh;"></div>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script>
        window.EJS_player = '#game-container';
        window.EJS_core = 'sega';
        window.EJS_gameUrl = '/battletoads.bin';
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;

        window.EJS_ready = () => {
            const mem = window.EJS_emulator.memory;
            const debug = document.getElementById('debug');
            
            // "Детектор": ищем байты, которые меняются при движении
            let lastMem = new Uint8Array(256);
            
            setInterval(() => {
                let changes = [];
                // Сканируем диапазон памяти, где обычно живут координаты (0xFFC000 - 0xFFC100)
                for(let i=0; i<256; i++) {
                    let val = mem.read(0xFFC000 + i);
                    if (val !== lastMem[i] && val > 0) {
                        changes.push(`Addr: 0xFFC${i.toString(16).toUpperCase()} Val: ${val}`);
                    }
                    lastMem[i] = val;
                }
                if(changes.length > 0) {
                    debug.innerHTML = changes.slice(0, 5).join('<br>');
                }
            }, 500); // Проверяем 2 раза в секунду
        };
    </script>
</body>
</html>
