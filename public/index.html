<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena - Perfect UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; overflow: hidden; margin: 0; }
        
        /* Система экранов: только один может быть active */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #09090b; z-index: 10; }
        .screen.active { display: flex; }
        
        #emulator-wrapper { width: 100vw; height: 50vh; background: #000; position: relative; border-bottom: 2px solid #222; }
        #game-container { width: 100% !important; height: 100% !important; }
        
        .ctrl-btn { width: 65px; height: 65px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #444; touch-action: none; color: #0f0; }
        .ctrl-btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- 1. ГЛАВНОЕ МЕНЮ -->
    <div id="screen-menu" class="screen active p-6 justify-center items-center space-y-8">
        <h1 class="text-cyan-500 text-4xl font-black italic uppercase">PIXEL ARENA</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm text-center shadow-2xl space-y-6">
            <div class="text-6xl">🐸</div>
            <h4 class="text-white font-bold uppercase text-lg">Battletoads</h4>
            <div class="flex flex-col gap-3">
                <button onclick="app.startSolo()" class="bg-white text-black font-black py-4 rounded-xl uppercase text-xs shadow-lg">Одиночная игра</button>
                <div class="flex gap-2">
                    <button onclick="app.hostRoom()" class="bg-cyan-500 text-black font-black py-4 rounded-xl flex-1 text-[10px] uppercase shadow-lg">Создать Лобби</button>
                    <button onclick="app.showJoin()" class="bg-zinc-800 font-bold py-4 rounded-xl flex-1 text-[10px] uppercase text-white border border-zinc-700">Войти P2</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. ЭКРАН ОЖИДАНИЯ (ДЛЯ ХОСТА) -->
    <div id="screen-wait" class="screen p-6 justify-center items-center text-center">
        <div class="bg-zinc-900 p-8 rounded-3xl border border-cyan-500/50 w-full max-w-sm shadow-2xl">
            <div class="text-cyan-400 text-lg animate-pulse mb-6 font-bold uppercase">Ожидание Игрока 2...</div>
            <p class="text-zinc-400 text-xs mb-2 uppercase">Продиктуй этот код другу:</p>
            <div id="room-code-display" class="text-5xl font-black text-white bg-black py-6 rounded-2xl tracking-[0.2em] border border-zinc-800">----</div>
            <button onclick="location.reload()" class="mt-8 text-red-500 text-xs uppercase font-bold px-4 py-2 border border-red-500/30 rounded-full">Отмена</button>
        </div>
    </div>

    <!-- 3. ЭКРАН ВВОДА КОДА (ДЛЯ ГОСТЯ) -->
    <div id="screen-join" class="screen p-6 justify-center items-center text-center">
        <div class="bg-zinc-900 p-8 rounded-3xl border border-red-500/50 w-full max-w-sm shadow-2xl">
            <h3 class="text-white font-bold mb-4 uppercase text-sm">Подключение</h3>
            <input id="join-input" type="text" class="w-full bg-black border border-zinc-700 p-4 rounded-xl text-center font-black text-3xl uppercase text-cyan-400 mb-6 outline-none focus:border-cyan-500" maxlength="4" placeholder="КОД">
            <button onclick="app.joinRoom()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl uppercase text-xs shadow-lg">Войти в игру</button>
            <button onclick="app.showMenu()" class="mt-6 text-zinc-500 text-[10px] uppercase font-bold underline">Назад в меню</button>
        </div>
    </div>

    <!-- 4. ИГРОВОЙ ЭКРАН (ЭМУЛЯТОР И ДЖОЙСТИК) -->
    <div id="screen-game" class="screen">
        <div class="h-10 bg-zinc-950 flex justify-between items-center px-4 border-b border-zinc-800">
            <span id="game-tag" class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest"></span>
            <button onclick="location.reload()" class="text-red-500 text-[8px] font-bold uppercase bg-red-900/20 px-3 py-1 rounded-full border border-red-900/50">Выход</button>
        </div>
        
        <div id="emulator-wrapper"><div id="game-container"></div></div>
        
        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around items-center">
            <div id="p2-wait-msg" class="hidden text-cyan-400 text-[10px] animate-pulse uppercase mb-2 font-bold text-center">P2: Ожидайте выбора режима Хостом...</div>
            
            <div id="controls-layout" class="flex justify-between items-center w-full max-w-sm">
                <!-- Крестовина -->
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-12 h-12 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <!-- Кнопки действий -->
                <div class="flex flex-col gap-6 items-center">
                    <div class="flex gap-2">
                        <button class="ctrl-btn bg-red-600 border-red-500 text-white font-bold" id="btn-a">A</button>
                        <button class="ctrl-btn bg-yellow-500 border-yellow-500 text-white font-bold" id="btn-b">B</button>
                    </div>
                    <button class="bg-zinc-800 py-3 px-8 rounded-xl text-[10px] font-bold text-white border border-zinc-700 uppercase tracking-widest" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ВЗЛОМ ГЕЙМПАДА: Эмулятор думает, что подключены 2 USB-геймпада
        const myPads = [
            { id: "P1", index: 0, connected: true, buttons: Array(16).fill(0).map(() => ({ pressed: false, value: 0 })), axes: [0,0] },
            { id: "P2", index: 1, connected: true, buttons: Array(16).fill(0).map(() => ({ pressed: false, value: 0 })), axes: [0,0] }
        ];
        navigator.getGamepads = () => myPads;

        const socket = io();
        let currentRoom = null;
        let playerNum = 1; 
        let isSolo = true;

        // Карта кнопок: Индексы Gamepad API (EmulatorJS читает их напрямую)
        const btnMap = { UP: 12, DOWN: 13, LEFT: 14, RIGHT: 15, A: 0, B: 1, START: 9 };

        window.app = {
            switchScreen: function(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            },
            showMenu: function() { this.switchScreen('screen-menu'); },
            showJoin: function() { this.switchScreen('screen-join'); },
            
            startSolo: function() {
                isSolo = true; playerNum = 1;
                this.loadEmulator('SOLO MODE');
            },
            
            hostRoom: function() {
                isSolo = false; playerNum = 1;
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('room-code-display').innerText = currentRoom;
                this.switchScreen('screen-wait');
                socket.emit('createRoom', currentRoom);
            },
            
            joinRoom: function() {
                const code = document.getElementById('join-input').value.toUpperCase();
                if(code.length !== 4) return alert("Введите 4 символа!");
                
                isSolo = false; playerNum = 2;
                currentRoom = code;
                socket.emit('joinRoom', currentRoom);
            },
            
            loadEmulator: function(tagText) {
                this.switchScreen('screen-game');
                document.getElementById('game-tag').innerText = tagText;

                // Для P2 скрываем кнопки, пока P1 не нажмет Start
                if(playerNum === 2 && !isSolo) {
                    document.getElementById('controls-layout').classList.add('hidden');
                    document.getElementById('p2-wait-msg').classList.remove('hidden');
                }

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = window.location.origin + '/battletoads.bin';
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        // Сервер говорит, что оба готовы - запускаем эмулятор одновременно
        socket.on('syncStart', () => {
            app.loadEmulator(`LOBBY: ${currentRoom} | P${playerNum}`);
        });

        socket.on('systemError', (msg) => { alert(msg); app.showMenu(); });

        // СИНХРОНИЗАЦИЯ: Получаем нажатия друга
        socket.on('inputSync', (data) => {
            if (isSolo) return;
            const padIdx = data.player - 1;
            const btnIdx = btnMap[data.btn];
            
            // Нажимаем виртуальную кнопку в чужом порту
            myPads[padIdx].buttons[btnIdx] = { pressed: data.state, value: data.state ? 1 : 0 };

            // Если P1 нажал START, у P2 появляются кнопки (они могут играть!)
            if(data.player === 1 && data.btn === 'START' && playerNum === 2 && data.state) {
                document.getElementById('controls-layout').classList.remove('hidden');
                document.getElementById('p2-wait-msg').classList.add('hidden');
            }
        });

        // ОТПРАВКА НАЖАТИЙ
        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (isDown) => {
                const myIdx = playerNum - 1;
                const bIdx = btnMap[k];
                
                // Нажимаем у себя
                myPads[myIdx].buttons[bIdx] = { pressed: isDown, value: isDown ? 1 : 0 };
                
                // Отправляем в сеть
                if(!isSolo && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: playerNum, btn: k, state: isDown });
                }
            };
            el.onpointerdown = (e) => { e.preventDefault(); handle(true); if(window.Telegram) Telegram.WebApp.HapticFeedback.impactOccurred('medium'); };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
            el.onpointerleave = (e) => { e.preventDefault(); handle(false); };
        }

        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-b', 'B'); bind('btn-start', 'START');
    </script>
</body>
</html>
