<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena - Perfect Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: monospace; overflow: hidden; margin: 0; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #09090b; z-index: 10; }
        .screen.active { display: flex; }
        #emulator-wrapper { width: 100vw; height: 50vh; background: #000; position: relative; border-bottom: 2px solid #222; }
        #game-container { width: 100% !important; height: 100% !important; }
        .ctrl-btn { width: 60px; height: 60px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid #333; touch-action: none; color: #0f0; }
        .ctrl-btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- 1. МЕНЮ -->
    <div id="screen-menu" class="screen active p-6 justify-center items-center space-y-8">
        <h1 class="text-cyan-500 text-4xl font-black italic uppercase tracking-tighter">PIXEL ARENA</h1>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm text-center shadow-2xl space-y-6">
            <div class="text-6xl">🐸</div>
            <h4 class="text-white font-bold uppercase text-lg">Battletoads</h4>
            <div class="flex flex-col gap-3">
                <button onclick="app.launchSolo()" class="bg-zinc-800 text-white font-bold py-4 rounded-xl w-full uppercase text-xs">Одиночная игра</button>
                <button onclick="app.createRoom()" class="bg-cyan-500 text-black font-black py-4 rounded-xl w-full uppercase text-xs shadow-lg shadow-cyan-500/20">Создать Лобби</button>
                <button onclick="app.showJoin()" class="bg-transparent border border-red-600 text-red-500 font-bold py-4 rounded-xl w-full uppercase text-xs">Войти по ID</button>
            </div>
        </div>
    </div>

    <!-- 2. ЭКРАН ВВОДА КОДА -->
    <div id="screen-join" class="screen p-6 justify-center items-center text-center">
        <div class="bg-zinc-900 p-8 rounded-3xl border border-red-500 w-full max-w-sm">
            <h3 class="text-white font-bold mb-4 uppercase text-sm">Вход в Турнир</h3>
            <input id="join-input" type="text" class="w-full bg-black border border-zinc-700 p-4 rounded-xl text-center font-black text-3xl uppercase text-cyan-400 mb-6 outline-none" maxlength="4" placeholder="КОД">
            <button onclick="app.joinRoom()" class="w-full bg-cyan-500 text-black font-black py-4 rounded-xl uppercase text-xs">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <!-- 3. ЭКРАН СИНХРОНИЗАЦИИ (МАГИЯ ЗДЕСЬ) -->
    <div id="screen-sync" class="screen p-6 justify-center items-center text-center bg-black/95 z-50">
        <div id="sync-status" class="text-cyan-400 text-lg animate-pulse mb-6 font-bold uppercase">Ожидание Игрока 2...</div>
        <div id="room-code" class="text-5xl font-black text-white bg-zinc-900 py-4 px-8 rounded-2xl tracking-[0.2em] border border-zinc-800">----</div>
        <p id="sync-details" class="text-zinc-500 text-[10px] mt-6 uppercase">Продиктуйте код другу</p>
    </div>

    <!-- 4. ИГРОВОЙ ЭКРАН -->
    <div id="screen-game" class="screen">
        <div class="h-10 bg-zinc-950 flex justify-between items-center px-4 border-b border-zinc-800">
            <span id="game-tag" class="text-[9px] font-bold text-cyan-400 uppercase tracking-widest"></span>
            <button onclick="location.reload()" class="text-red-500 text-[8px] font-bold uppercase">Выход</button>
        </div>
        
        <div id="emulator-wrapper"><div id="game-container"></div></div>
        
        <div class="flex-1 bg-zinc-950 p-4 flex flex-col justify-around items-center">
            <div id="controls-layout" class="flex justify-between items-center w-full max-w-sm">
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button class="ctrl-btn" id="btn-up">▲</button><div></div>
                    <button class="ctrl-btn" id="btn-left">◀</button>
                    <div class="w-10 h-10 bg-zinc-900 rounded-full border-2 border-zinc-800"></div>
                    <button class="ctrl-btn" id="btn-right">▶</button><div></div>
                    <button class="ctrl-btn" id="btn-down">▼</button><div></div>
                </div>
                <div class="flex flex-col gap-6 items-center">
                    <button class="ctrl-btn bg-red-600 border-red-500 text-white font-bold" id="btn-a">A</button>
                    <button class="bg-zinc-800 py-3 px-8 rounded-xl text-[10px] font-bold text-white border border-zinc-700 uppercase" id="btn-start">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const myPads = [
            { index: 0, connected: true, buttons: Array(16).fill(0).map(() => ({ pressed: false, value: 0 })), axes: [0,0] },
            { index: 1, connected: true, buttons: Array(16).fill(0).map(() => ({ pressed: false, value: 0 })), axes: [0,0] }
        ];
        navigator.getGamepads = () => myPads;

        const socket = io();
        let currentRoom = null;
        let playerNum = 1; 
        let isSolo = true;
        let blobUrl = null; // Здесь будет лежать скачанная игра

        const btnMap = { UP: 12, DOWN: 13, LEFT: 14, RIGHT: 15, A: 0, START: 9 };
        const ROM_URL = 'https://raw.githubusercontent.com/klimsporyshevklim-collab/Retrosega/main/public/battletoads.bin';

        window.app = {
            switch: function(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },
            
            launchSolo: function() {
                isSolo = true; playerNum = 1;
                this.switch('screen-sync');
                document.getElementById('sync-status').innerText = "ЗАГРУЗКА...";
                document.getElementById('room-code').style.display = 'none';
                this.downloadRomAndReady();
            },
            
            createRoom: function() {
                isSolo = false; playerNum = 1;
                currentRoom = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('room-code').innerText = currentRoom;
                this.switch('screen-sync');
                socket.emit('createRoom', currentRoom);
            },

            showJoin: function() { this.switch('screen-join'); },
            
            joinRoom: function() {
                const code = document.getElementById('join-input').value.toUpperCase();
                if(code.length !== 4) return;
                isSolo = false; playerNum = 2;
                currentRoom = code;
                this.switch('screen-sync');
                document.getElementById('sync-status').innerText = "ПОДКЛЮЧЕНИЕ...";
                document.getElementById('room-code').innerText = currentRoom;
                socket.emit('joinRoom', currentRoom);
            },

            // Функция скачивания игры в память
            downloadRomAndReady: async function() {
                document.getElementById('sync-status').innerText = "СКАЧИВАНИЕ ИГРЫ...";
                document.getElementById('sync-details').innerText = "Пожалуйста, подождите";
                
                try {
                    const res = await fetch(ROM_URL);
                    const blob = await res.blob();
                    blobUrl = URL.createObjectURL(blob); // Сохраняем готовую игру в ОЗУ
                    
                    if (isSolo) {
                        this.bootEmulator(); // В соло запускаем сразу
                    } else {
                        document.getElementById('sync-status').innerText = "ОЖИДАНИЕ СОПЕРНИКА...";
                        document.getElementById('sync-details').innerText = "Игра скачана. Ждем готовность второго игрока.";
                        socket.emit('playerReady', currentRoom); // Говорим серверу, что мы готовы
                    }
                } catch (e) {
                    alert("Ошибка скачивания: " + e.message);
                }
            },

            // ОДНОВРЕМЕННЫЙ ЗАПУСК ЭМУЛЯТОРА
            bootEmulator: function() {
                this.switch('screen-game');
                document.getElementById('game-tag').innerText = isSolo ? 'SOLO' : `PVP: ${currentRoom} | P${playerNum}`;

                window.EJS_player = '#game-container';
                window.EJS_core = 'sega';
                window.EJS_gameUrl = blobUrl; // Берем уже скачанную игру!
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                window.EJS_startOnLoaded = true;

                window.EJS_onGameStart = function() {
                    if (window.EJS_emulator) window.EJS_emulator.setSettings({ p2_type: 1 });
                };

                const s = document.createElement('script');
                s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(s);
            }
        };

        // Сервер говорит "Оба зашли, качайте игру"
        socket.on('startDownload', () => {
            app.downloadRomAndReady();
        });

        // Сервер говорит "Оба скачали, СТАРТ!"
        socket.on('bootEngine', () => {
            app.bootEmulator();
        });

        socket.on('inputSync', (data) => {
            if (isSolo) return;
            const padIdx = data.player - 1; 
            const bIdx = btnMap[data.btn];
            myPads[padIdx].buttons[bIdx] = { pressed: data.state, value: data.state ? 1 : 0 };
        });

        function bind(id, k) {
            const el = document.getElementById(id);
            const handle = (isDown) => {
                const myIdx = playerNum - 1;
                const bIdx = btnMap[k];
                myPads[myIdx].buttons[bIdx] = { pressed: isDown, value: isDown ? 1 : 0 };
                if(!isSolo && currentRoom) {
                    socket.emit('inputSync', { roomId: currentRoom, player: playerNum, btn: k, state: isDown });
                }
            };
            el.onpointerdown = (e) => { e.preventDefault(); handle(true); };
            el.onpointerup = (e) => { e.preventDefault(); handle(false); };
            el.onpointerleave = (e) => { e.preventDefault(); handle(false); };
        }

        bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
        bind('btn-a', 'A'); bind('btn-start', 'START');
    </script>
</body>
</html>
