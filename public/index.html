<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>P2P Pixel Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: monospace; }
        .btn { background: #00f0ff; color: #000; padding: 20px; border-radius: 8px; width: 80%; font-weight: bold; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="menu" class="h-screen flex flex-col justify-center items-center">
        <h1 class="text-2xl text-cyan-400 mb-6">P2P ARENA</h1>
        <button class="btn" onclick="initHost()">СОЗДАТЬ ИГРУ</button>
        <button class="btn bg-pink-500" onclick="initJoin()">ВОЙТИ В ИГРУ</button>
    </div>

    <div id="game-container" class="hidden w-screen h-screen"></div>

    <script>
        let pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let channel;

        // ХОСТ
        async function initHost() {
            channel = pc.createDataChannel("game");
            channel.onmessage = e => {
                const code = { "A": "KeyX", "B": "KeyZ", "UP": "ArrowUp" }[e.data];
                window.dispatchEvent(new KeyboardEvent('keydown', { code }));
                setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code })), 100);
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Ждем соединения
            pc.onicecandidate = e => {
                if(!e.candidate) {
                    const offerBase64 = btoa(JSON.stringify(pc.localDescription));
                    prompt("Скопируй это другу:", offerBase64);
                    // Запуск эмулятора
                    window.EJS_player = '#game-container';
                    window.EJS_core = 'sega';
                    window.EJS_gameUrl = '/sonic.bin';
                    window.EJS_pathtodata = '/data/';
                    const s = document.createElement('script'); s.src = '/data/loader.js'; document.body.appendChild(s);
                    document.getElementById('menu').style.display = 'none';
                }
            };
        }

        // КЛИЕНТ
        async function initJoin() {
            const offerBase64 = prompt("Вставь код друга:");
            await pc.setRemoteDescription(JSON.parse(atob(offerBase64)));
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            pc.onicecandidate = e => {
                if(!e.candidate) {
                    prompt("Скопируй ответ:", btoa(JSON.stringify(pc.localDescription)));
                }
            };

            pc.ondatachannel = e => {
                channel = e.channel;
                document.body.innerHTML = `
                    <div class="h-screen flex flex-col gap-4 p-10">
                        <button class="btn" onpointerdown="channel.send('UP')">UP</button>
                        <button class="btn" onpointerdown="channel.send('A')" style="background:red">A</button>
                    </div>`;
            };
        }
    </script>
</body>
</html>
