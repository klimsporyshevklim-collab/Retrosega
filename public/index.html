<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Arena v5.3 (Full Library)</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: white; font-family: 'Space Mono', monospace; overflow: hidden; margin: 0; }
        .font-retro { font-family: 'Orbitron', sans-serif; }
        
        .game-card { background: #111113; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: 0.3s; }
        .pixel-border { border: 1px solid rgba(0, 240, 255, 0.4); box-shadow: 0 0 15px rgba(0, 240, 255, 0.1); }
        
        .btn-action { font-weight: 800; font-size: 9px; border-radius: 6px; text-transform: uppercase; transition: 0.2s; border: none; cursor: pointer; }
        .btn-action:active { transform: scale(0.95); }
        .btn-p1 { background: #00f0ff; color: black; }
        .btn-p2 { background: #ff003c; color: white; }

        .nav-tab { flex: 1; padding: 15px 0; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #444; border-bottom: 2px solid transparent; background: transparent; border: none; }
        .nav-tab.active { color: #00f0ff; border-color: #00f0ff; background: linear-gradient(to top, rgba(0,240,255,0.05), transparent); }

        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #emulator-wrapper { width: 100%; height: 45vh; background: #000; border-bottom: 2px solid #333; position: relative; }
        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        #controller-wrapper { flex: 1; background: #09090b; display: flex; flex-direction: column; justify-content: center; padding: 10px; }
        
        .dpad-btn { width: 50px; height: 50px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; border: 1px solid #333; }
        .dpad-btn:active { background: #00f0ff; color: black; }
        .action-btn { width: 60px; height: 60px; border-radius: 50%; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 bg-zinc-950 flex justify-between items-center z-50 border-b border-white/5">
        <h1 class="text-white font-retro font-bold text-xs tracking-tighter uppercase italic">Arena<span class="text-[#00f0ff]">X</span></h1>
        <div class="flex items-center gap-2 bg-zinc-900 px-3 py-1.5 rounded-full border border-white/10">
            <i data-lucide="zap" class="w-3 h-3 text-[#00f0ff] fill-[#00f0ff]"></i>
            <span id="ui-balance" class="text-[10px] font-bold text-white">ONLINE</span>
        </div>
    </header>

    <nav class="flex bg-zinc-950 border-b border-white/5 z-50">
        <button id="tab-multi" class="nav-tab active" onclick="switchTab('multi')">Library</button>
    </nav>

    <main id="main-content" class="flex-1 overflow-y-auto p-4 bg-black pb-24">
        <div id="screen-multi" class="space-y-4"><div id="list-multi"></div></div>
    </main>

    <!-- ИГРОВОЙ ОВЕРЛЕЙ -->
    <div id="game-overlay">
        <div class="h-10 bg-zinc-950 border-b border-primary/20 flex justify-between items-center px-4">
            <span id="game-tag" class="text-[9px] font-bold text-[#00f0ff] uppercase tracking-widest bg-[#00f0ff]/10 px-2 py-1 rounded">Loading Engine...</span>
            <button onclick="location.reload()" class="text-zinc-500 bg-zinc-800 px-2 py-1 rounded text-[8px] uppercase font-bold">QUIT</button>
        </div>
        
        <div id="emulator-wrapper">
            <div id="game-container"></div>
        </div>

        <div id="controller-wrapper">
            <div class="flex justify-between items-center w-full max-w-md mx-auto h-full">
                <!-- D-PAD -->
                <div class="grid grid-cols-3 gap-2">
                    <div></div><button id="btn-up" class="dpad-btn">▲</button><div></div>
                    <button id="btn-left" class="dpad-btn">◀</button>
                    <div class="w-[50px] h-[50px] bg-zinc-900 rounded-full border-2 border-black"></div>
                    <button id="btn-right" class="dpad-btn">▶</button>
                    <div></div><button id="btn-down" class="dpad-btn">▼</button><div></div>
                </div>
                <!-- Action Buttons -->
                <div class="flex flex-col gap-6 items-center">
                    <button id="btn-b" class="action-btn bg-yellow-500">B</button>
                    <div class="flex gap-4">
                        <button id="btn-a" class="action-btn bg-red-600">A</button>
                        <button id="btn-c" class="action-btn bg-blue-600">C</button>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <button id="btn-start" class="w-32 py-2 bg-zinc-800 text-zinc-400 rounded-full text-[10px] font-bold uppercase border border-zinc-700 tracking-widest">START / SELECT</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var isHost = false; 
            
            // Карта кнопок
            var mapP1 = { UP: "ArrowUp", DOWN: "ArrowDown", LEFT: "ArrowLeft", RIGHT: "ArrowRight", A: "KeyX", B: "KeyZ", C: "KeyC", START: "Enter" };
            
            // ТВОИ ИГРЫ (Точные названия файлов с твоего скриншота)
            const ALL_GAMES = [
                { id: 'battletoads.md', title: 'Battletoads', core: 'sega', color: '#00ff66' },
                { id: 'btdd.md', title: 'BT & Double Dragon', core: 'sega', color: '#00ff66' },
                { id: 'tmnt.md', title: 'TMNT Hyperstone', core: 'sega', color: '#ffcc00' },
                { id: 'sonic.bin', title: 'Sonic The Hedgehog', core: 'sega', color: '#00f0ff' },
                { id: 'sonic2.md', title: 'Sonic 2', core: 'sega', color: '#00f0ff' },
                { id: 'comix.md', title: 'Comix Zone', core: 'sega', color: '#ffcc00' },
                { id: 'roadrash.md', title: 'Road Rash', core: 'sega', color: '#ff003c' },
                { id: 'sunset.md', title: 'Sunset Riders', core: 'sega', color: '#ff9900' },
                { id: 'jurassic.md', title: 'Jurassic Park', core: 'sega', color: '#ff003c' },
                { id: 'lionking.md', title: 'The Lion King', core: 'sega', color: '#ffcc00' },
                { id: 'simpsons.md', title: 'The Simpsons', core: 'sega', color: '#00f0ff' },
                { id: 'tanks.nes', title: 'Battle City (Tanks)', core: 'nes', color: '#aaaaaa' },
                { id: 'realmonsters.sfc', title: 'Real Monsters', core: 'snes', color: '#9900ff' },
                { id: 'tinytoon_sega.md', title: 'Tiny Toon (Sega)', core: 'sega', color: '#00f0ff' },
                { id: 'tinytoon1.nes', title: 'Tiny Toon 1', core: 'nes', color: '#00f0ff' },
                { id: 'tinytoon2.nes', title: 'Tiny Toon 2', core: 'nes', color: '#00f0ff' },
                { id: '1200in1.nes', title: '1200 in 1 (Dendy)', core: 'nes', color: '#aaaaaa' }
            ];

            document.addEventListener('DOMContentLoaded', function() {
                lucide.createIcons();
                
                // Отрисовка списка
                document.getElementById('list-multi').innerHTML = ALL_GAMES.map(g => `
                    <div class="game-card p-4 flex justify-between items-center border-l-4" style="border-left-color: ${g.color}">
                        <div>
                            <h4 class="text-xs font-bold uppercase italic">${g.title}</h4>
                            <p class="text-[7px] text-zinc-500 font-bold uppercase tracking-widest">${g.core} ENGINE</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.app.playSolo('${g.id}', '${g.core}')" class="btn-action btn-p1 px-4 py-2">SOLO PLAY</button>
                        </div>
                    </div>
                `).join('');

                // --- ЗАПУСК ЭМУЛЯТОРА ЧЕРЕЗ JSDELIVR CDN ---
                function loadEmulator(romFile, core) {
                    document.getElementById('game-overlay').style.display = 'flex';
                    
                    var baseUrl = window.location.origin;
                    if (!baseUrl || baseUrl === 'null') {
                        baseUrl = window.location.protocol + "//" + window.location.host;
                    }
                    
                    window.EJS_player = '#game-container';
                    window.EJS_core = core;
                    window.EJS_gameUrl = baseUrl + '/' + romFile; 
                    
                    window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/';
                    window.EJS_startOnLoaded = true;
                    
                    var s = document.createElement('script'); 
                    s.src = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js';
                    document.body.appendChild(s);
                }

                window.app = {
                    playSolo: function(rom, core) {
                        isHost = true; 
                        document.getElementById('game-tag').innerText = "PLAYING: " + rom;
                        loadEmulator(rom, core);
                    }
                };

                // ПРИВЯЗКА КНОПОК ДЖОЙСТИКА
                function bind(id, btnName) {
                    var el = document.getElementById(id);
                    function handlePress(isPressed) {
                        if (isPressed && window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                        var code = mapP1[btnName];
                        if(code) window.dispatchEvent(new KeyboardEvent(isPressed ? 'keydown' : 'keyup', { code: code }));
                    }
                    el.addEventListener('pointerdown', e => { e.preventDefault(); handlePress(true); });
                    el.addEventListener('pointerup', e => { e.preventDefault(); handlePress(false); });
                    el.addEventListener('pointerleave', e => { e.preventDefault(); handlePress(false); });
                }

                bind('btn-up', 'UP'); bind('btn-down', 'DOWN'); bind('btn-left', 'LEFT'); bind('btn-right', 'RIGHT');
                bind('btn-a', 'A'); bind('btn-b', 'B'); bind('btn-c', 'C'); bind('btn-start', 'START');
            });
        })();
    </script>
</body>
</html>
